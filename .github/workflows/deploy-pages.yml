name: Deploy to GitHub Pages

# Runs on every push to master — including changes inside either sheet
# directory (solutions, index.html, etc.) — so the live site always reflects
# the latest progress. Also runnable manually from the Actions tab.
on:
  push:
    branches: [master]
  workflow_dispatch:

# Permissions the deploy-pages action needs.
permissions:
  contents: read
  pages: write
  id-token: write

# Let an in-progress deploy finish, but don't pile up redundant runs.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Whole repo: the root index.html links into each sheet's tracker.
          path: "."

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
