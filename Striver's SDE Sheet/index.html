  {
    name: "Dynamic Programming", problems: [
      { name: "Max Product Subarray", d: "hard"                     , q: "Max Product Subarray\nGiven an integer array nums (containing positive, negative, and zero\nvalues), find a contiguous non-empty subarray whose product is the\nlargest, and return that product. The test cases are generated so that\nthe answer fits in a 32-bit integer.\n\nExamples:\nExample 1:\nInput: nums = [2, 3, -2, 4]\nOutput: 6\nExplanation: [2, 3] has the largest product 6.\n\nExample 2:\nInput: nums = [-2, 0, -1]\nOutput: 0\nExplanation: The result cannot be 2 because [-2, -1] is not contiguous.\n\nConstraints:\n1 <= nums.length <= 2 * 10^4\n-10 <= nums[i] <= 10\nThe product of any prefix or suffix of nums fits in a 32-bit integer.", n: "#Brute Force:\n1.\nTC -> O(), SC -> O()\n\n#Better Approach:\n1.\nTC -> O(), SC -> O()\n\n#Optimal Approach:\n1.\nTC -> O(), SC -> O()\n\n#KEY INSIGHT:\n-" },
      { name: "Longest Increasing Subsequence", d: "medium"                     , q: "Longest Increasing Subsequence\nGiven an integer array nums, return the length of the longest STRICTLY\nincreasing subsequence. A subsequence is a sequence derived from the\narray by deleting some or no elements without changing the order of the\nremaining elements.\n\nExamples:\nExample 1:\nInput: nums = [10, 9, 2, 5, 3, 7, 101, 18]\nOutput: 4\nExplanation: The longest increasing subsequence is [2, 3, 7, 101], and its length is 4.\n\nExample 2:\nInput: nums = [0, 1, 0, 3, 2, 3]\nOutput: 4\nExplanation: The longest increasing subsequence is [0, 1, 2, 3], and its length is 4.", n: "#Brute Force:\n1.\nTC -> O(), SC -> O()\n\n#Better Approach:\n1.\nTC -> O(), SC -> O()\n\n#Optimal Approach:\n1.\nTC -> O(), SC -> O()\n\n#KEY INSIGHT:\n-" },
      { name: "Longest common subsequence", d: "hard"                     , q: "Longest common subsequence\nGiven two strings str1 and str2, print the longest common subsequence\nof the two strings. A subsequence of a string is a list of characters of\nthe string where zero or more characters in the original string are\ndeleted without disturbing the relative ordering of the remaining\ncharacters. If multiple LCS exist, return any one. If no common\nsubsequence exists, return \"\".\n\nExamples:\nExample 1:\nInput: str1 = \"abcd\", str2 = \"bdef\"\nOutput: \"bd\"\n\nExample 2:\nInput: str1 = \"apple\", str2 = \"waffle\"\nOutput: \"ale\"\n\nExamples:\nInput: str1 = \"abcd\", str2=\"bdef\"\nOutput: \"bd\"\nExplanation: LCS of two strings is \"bd\".\n\nInput: str1 = \"apple\" str2 = \"waffle\"\nOutput: \"ale\"\nExplanation: LCS of two strings is \"ale\".", n: "#Brute Force:\n1.\nTC -> O(), SC -> O()\n\n#Better Approach:\n1.\nTC -> O(), SC -> O()\n\n#Optimal Approach:\n1.\nTC -> O(), SC -> O()\n\n#KEY INSIGHT:\n-" },
      { name: "0 and 1 Knapsack", d: "hard"                     , q: "0 and 1 Knapsack\nA thief wants to rob a store. He is carrying a bag of capacity W. The\nstore has 'n' items. Item i has weight wt[i] and value val[i]. He can\neither pick an item entirely or leave it out (0/1 knapsack — items\ncannot be split). What is the maximum value he can carry such that the\ntotal weight is <= W?\n\nExamples:\nExample 1:\nInput: val = [60, 100, 120], wt = [10, 20, 30], W = 50\nOutput: 220\nExplanation: Select items with weights 20 and 30 for a total value of 100 + 120 = 220.\n\nExample 2:\nInput: val = [10, 40, 30, 50], wt = [5, 4, 6, 3], W = 10\nOutput: 90\nExplanation: Select items with weights 4 and 3 for a total value of 40 + 50 = 90.", n: "#Brute Force:\n1.\nTC -> O(), SC -> O()\n\n#Better Approach:\n1.\nTC -> O(), SC -> O()\n\n#Optimal Approach:\n1.\nTC -> O(), SC -> O()\n\n#KEY INSIGHT:\n-" },
      { name: "Edit distance", d: "hard"                     , q: "Edit distance\nGiven two strings S1 and S2, we need to convert S1 to S2. The following\nthree operations are allowed:\n  1. Deletion of a character.\n  2. Replacement of a character with another character.\n  3. Insertion of a character.\nFind the minimum number of operations required to convert S1 to S2.\n\nExamples:\nExample 1:\nInput: start = \"planet\", target = \"plan\"\nOutput: 2\nExplanation:\nTo transform \"planet\" into \"plan\", the following operations are required:\n1. Delete the character 'e': \"planet\" -> \"plan\"\n2. Delete the character 't': \"plan\" -> \"plan\"\nThus, a total of 2 operations are needed.\n\nExample 2:\nInput: start = \"abcdefg\", target = \"azced\"\nOutput: 4\nExplanation:\nTo transform \"abcdefg\" into \"azced\", the following operations are required:\n1. Replace 'b' with 'z': \"abcdefg\" -> \"azcdefg\"\n2. Delete 'd': \"azcdefg\" -> \"azcefg\"\n3. Delete 'f': \"azcefg\" -> \"azceg\"\n4. Replace 'g' with 'd': \"azceg\" -> \"azced\"\nThus, a total of 4 operations are needed.", n: "#Brute Force:\n1.\nTC -> O(), SC -> O()\n\n#Better Approach:\n1.\nTC -> O(), SC -> O()\n\n#Optimal Approach:\n1.\nTC -> O(), SC -> O()\n\n#KEY INSIGHT:\n-" },
      { name: "Maximum Sum Increasing Subsequence", d: "medium"                     , q: "Maximum Sum Increasing Subsequence\nGiven an array arr[] of positive integers, find the maximum possible\nsum of a subsequence such that the elements of the subsequence are in\nstrictly increasing order. The subsequence does not need to be\ncontiguous. You must choose elements such that the resulting sequence\nis strictly increasing AND the sum of the chosen elements is maximum.\n\nExamples:\nExample 1:\nInput: arr = [1, 101, 2, 3, 100, 4, 5]\nOutput: 106\nExplanation: The increasing subsequence with max sum is [1, 2, 3, 100],\nsum = 106.\n\nExample 2:\nInput: arr = [3, 4, 5, 10]\nOutput: 22\nExplanation: The whole array is increasing; sum = 3 + 4 + 5 + 10 = 22.\n\nConstraints:\n1 <= arr.length <= 1000\n1 <= arr[i] <= 10^5", n: "#Brute Force:\n1.\nTC -> O(), SC -> O()\n\n#Better Approach:\n1.\nTC -> O(), SC -> O()\n\n#Optimal Approach:\n1.\nTC -> O(), SC -> O()\n\n#KEY INSIGHT:\n-" },
      { name: "Matrix chain multiplication", d: "hard"                     , q: "Matrix chain multiplication\nGiven a chain of n matrices A1, A2, ..., An, denoted by an array of\nsize n+1 where arr[i-1] x arr[i] gives the dimensions of matrix A_i,\nfind the minimum number of scalar multiplications needed to multiply\nthe chain. You only need to compute the cost, not the actual\nparenthesization.\nTwo matrices A (p x q) and B (q x r) can be multiplied in p*q*r\noperations to produce a (p x r) matrix.\n\nExamples:\nInput : [40, 20, 30, 10, 30]\nOutput : 26000\nExplanation : Best parenthesization is ( (A1 x (A2 x A3)) x A4 ).\n\nInput : [10, 20, 30, 40, 30]\nOutput : 30000\nExplanation : Optimal parenthesization minimizes cost.", n: "#Brute Force:\n1.\nTC -> O(), SC -> O()\n\n#Better Approach:\n1.\nTC -> O(), SC -> O()\n\n#Optimal Approach:\n1.\nTC -> O(), SC -> O()\n\n#KEY INSIGHT:\n-" }
    ]
  },
  {
    name: "Dynamic Programming Part-II", problems: [
      { name: "Minimum sum path in the matrix, (count paths and similar type do, also backtrack to find the Minimum path)", d: "medium" , q: "Minimum sum path in the matrix, (count paths and similar type do, also backtrack to find the Minimum path)\nGiven a m x n grid filled with non-negative numbers, find a path from top left to bottom right, which minimizes the sum of all numbers along its path. Note: You can only move eit.", n: "#Brute Force:\n1.\nTC -> O(), SC -> O()\n\n#Better Approach:\n1.\nTC -> O(), SC -> O()\n\n#Optimal Approach:\n1.\nTC -> O(), SC -> O()\n\n#KEY INSIGHT:\n-" },
      { name: "Coin change II", d: "hard"                     , q: "Coin change II\nWe are given an array Arr with N distinct coins and a target. We have\nan infinite supply of each coin denomination. We need to find the\nnumber of distinct ways we can sum up coin values to make the target.\nOrder of coins does NOT matter (i.e., [1, 2, 1] and [1, 1, 2] count as\nthe same combination).\n\nExamples:\nExample 1:\nInput: coins = [2, 4,10], amount = 10\nOutput: 4\nExplanation: The four combinations are:\n10 = 10\n10 = 4 + 4 + 2\n10 = 4 + 2 + 2 + 2\n10 = 2 + 2 + 2 + 2 + 2\n\nExample 2:\nInput: coins = [5], amount = 5\nOutput: 1\nExplanation: There is one combination: 5 = 5.", n: "#Brute Force:\n1.\nTC -> O(), SC -> O()\n\n#Better Approach:\n1.\nTC -> O(), SC -> O()\n\n#Optimal Approach:\n1.\nTC -> O(), SC -> O()\n\n#KEY INSIGHT:\n-" },
      { name: "Subset sum equals to target", d: "hard"                     , q: "Subset sum equals to target\nGiven an array print all the sum of the subset generated from it, in the increasing order.\n\nExamples:\nInput: N = 3, arr[] = {5,2,1}\nOutput: 0,1,2,3,5,6,7,8\nExplanation: We have to find all the subset’s sum and print them.in this case the generated subsets are [ [], [1], [2], [2,1], [5], [5,1], [5,2]. [5,2,1],so the sums we get will be 0,1,2,3,5,6,7,8\n\nInput: N=3,arr[]= {3,1,2}\nOutput: 0,1,2,3,3,4,5,6\nExplanation: We have to find all the subset’s sum and print them.in this case the generated subsets are [ [], [1], [2], [2,1], [3], [3,1], [3,2]. [3,2,1],so the sums we get will be 0,1,2,3,3,4,5,6", n: "#Brute Force:\n1.\nTC -> O(), SC -> O()\n\n#Better Approach:\n1.\nTC -> O(), SC -> O()\n\n#Optimal Approach:\n1.\nTC -> O(), SC -> O()\n\n#KEY INSIGHT:\n-" },
      { name: "Rod cutting problem", d: "hard"                     , q: "Rod cutting problem\nGiven a rod of length N inches and an array price[] where price[i]\ndenotes the value of a piece of rod of length (i+1) inches (so\nprice[0] is the price of a 1-inch piece, price[N-1] is the price of an\nN-inch piece). Determine the maximum value obtainable by cutting the\nrod into smaller pieces and selling them. You may cut the rod into any\nnumber of pieces (including 0 cuts / keeping it whole), and each piece\nsize has its corresponding price from the array.\n\nExamples:\nInput : price = [1, 6, 8, 9, 10, 19, 7, 20], N = 8\nOutput :25\nExplanation :Cut the rod into lengths of 2 and 6 for a total price of 6 + 19= 25.\n\nInput :price = [1, 5, 8, 9], N = 4\nOutput :10\nExplanation :Cut the rod into lengths of 2 and 2 for a total price of 5 + 5 = 10.", n: "#Brute Force:\n1.\nTC -> O(), SC -> O()\n\n#Better Approach:\n1.\nTC -> O(), SC -> O()\n\n#Optimal Approach:\n1.\nTC -> O(), SC -> O()\n\n#KEY INSIGHT:\n-" },

const PLAN_START = "2026-06-22";  // YYYY-MM-DD (a Monday)

// Day offsets within a week (Mon=0)
const DAY_OFFSET = { Mon: 0, Tue: 1, Wed: 2, Thu: 3, Fri: 4, Sat: 5, Sun: 6 };
const DOW = ["Sun", "Mon", "Tue", "Wed", "Thu", "Fri", "Sat"];

function parseDate(s) {
  const [y, m, d] = s.split("-").map(Number);
  return new Date(y, m - 1, d);
}
function ymd(dt) {
  return dt.getFullYear() + "-" + String(dt.getMonth() + 1).padStart(2, "0") + "-" + String(dt.getDate()).padStart(2, "0");
}
function diffDays(a, b) {
  return Math.floor((a - b) / 86400000);
}
function plannedDate(wk, dy) {
  const start = parseDate(PLAN_START);
  start.setDate(start.getDate() + (wk - 1) * 7 + DAY_OFFSET[dy]);
  return start;
}
function fmtDate(dt) {
  return DOW[dt.getDay()] + ", " + dt.toLocaleString("en-US", { month: "short", day: "numeric" });
}

// Build name -> {si, pi} lookup against DATA
function buildPlanLookup() {
  const lookup = {};
  DATA.forEach((sec, si) => {
    sec.problems.forEach((p, pi) => {
      lookup[p.name] = { si, pi };
    });
  });
  return lookup;
}
const PLAN_LOOKUP = buildPlanLookup();

// Tag every PLAN row: planned ISO date + array of {name, si, pi} resolved entries
const PLAN_ROWS = PLAN.map(row => {
  const dt = plannedDate(row.wk, row.dy);
  return {
    wk: row.wk,
    dy: row.dy,
    iso: ymd(dt),
    dt: dt,
    items: row.ps.map(name => ({
      name,
      loc: PLAN_LOOKUP[name] || null,
    }))
  };
});

// All PLANNED problem names -> the row they came from
const NAME_TO_ROW = {};
PLAN_ROWS.forEach(r => r.items.forEach(it => NAME_TO_ROW[it.name] = r));

function isSolved(loc) {
  if (!loc) return false;
  const key = getKey(loc.si, loc.pi);
  const p = DATA[loc.si].problems[loc.pi];
  return key in state ? !!state[key] : !!p.s;
}

function categorizePlan() {
  const today = new Date();
  today.setHours(0, 0, 0, 0);
  const todayISO = ymd(today);

  const past = [], todays = [], future = [];
  PLAN_ROWS.forEach(row => {
    if (row.iso < todayISO) past.push(row);
    else if (row.iso === todayISO) todays.push(row);
    else future.push(row);
  });

  // Backlog = past planned items not yet solved
  const backlog = past.flatMap(row =>
    row.items.filter(it => !isSolved(it.loc)).map(it => ({ row, item: it }))
  );

  // Today's items
  const todayItems = todays.flatMap(row =>
    row.items.map(it => ({ row, item: it }))
  );

  // Extras: solved problems that are NOT in past/today plan
  //   - solved AND scheduled in future
  //   - solved AND not in PLAN at all
  const extras = [];
  DATA.forEach((sec, si) => {
    sec.problems.forEach((p, pi) => {
      if (!isSolved({si, pi})) return;
      const row = NAME_TO_ROW[p.name];
      if (!row) {
        extras.push({ row: null, item: { name: p.name, loc: {si, pi} } });
      } else if (row.iso > todayISO) {
        extras.push({ row, item: { name: p.name, loc: {si, pi} } });
      }
    });
  });

  // Find next non-empty future day for "Upcoming" preview
  const upcoming = future[0] || null;
  return { today, todayISO, past, todayRows: todays, future, backlog, todayItems, extras, upcoming };
}

    div.appendChild(tag);
  }
  if (item.loc) {
    div.addEventListener("click", () => {
      const checked = isSolved(item.loc);
      toggleProblem(item.loc.si, item.loc.pi, !checked);
    });
  }
  return div;
}

function renderGroupedByDay(entries) {
  // entries: [{ row, item }, ...]; group by row
  const list = document.getElementById("plan-list");
  list.textContent = "";
  if (!entries.length) {
    const empty = document.createElement("div");
    empty.className = "plan-empty";
    empty.textContent = "Nothing here — you're all caught up.";
    list.appendChild(empty);
    return;
  }
  const groups = new Map();
  entries.forEach(e => {
    const key = e.row ? `${e.row.wk}|${e.row.dy}` : "off-plan";
    if (!groups.has(key)) groups.set(key, { row: e.row, items: [] });
    groups.get(key).items.push(e.item);
  });
  groups.forEach(g => {
    const wrap = document.createElement("div");
    wrap.className = "plan-day-group";
    const label = document.createElement("div");
    label.className = "plan-day-label";
    if (g.row) {
      const pill = document.createElement("span");
      pill.className = "wk-pill";
      pill.textContent = "W" + g.row.wk;
      label.appendChild(pill);
      label.appendChild(document.createTextNode(g.row.dy + " · " + fmtDate(g.row.dt)));
    } else {
      label.textContent = "Off-plan / not in 12-week schedule";
    }
    wrap.appendChild(label);
    g.items.forEach(it => wrap.appendChild(renderPlanItem(it, g.row)));
    list.appendChild(wrap);
  });
}

const fullPlanOpenWeeks = new Set();

function renderFullPlan(cat) {
  const list = document.getElementById("plan-list");
  list.textContent = "";
  // Group PLAN_ROWS by week number
  const byWeek = new Map();
  PLAN_ROWS.forEach(r => {
    if (!byWeek.has(r.wk)) byWeek.set(r.wk, []);
    byWeek.get(r.wk).push(r);
  });
  // Determine current week
  const todayISO = cat.todayISO;
  let curWk = null;
  for (const r of PLAN_ROWS) {
    if (r.iso >= todayISO) { curWk = r.wk; break; }
  }
  // Auto-open current week on first render
  if (curWk && fullPlanOpenWeeks.size === 0) fullPlanOpenWeeks.add(curWk);

  const totalAll = PLAN_ROWS.reduce((n, r) => n + r.items.length, 0);
  const done = PLAN_ROWS.reduce(
    (n, r) => n + r.items.filter(it => isSolved(it.loc)).length, 0
  );
  const summary = document.createElement("div");
  summary.className = "plan-empty";
  summary.style.color = "var(--text-dim)";
  summary.style.marginBottom = "10px";
  summary.textContent = `12-week plan · ${done} / ${totalAll} done`;
  list.appendChild(summary);

  Array.from(byWeek.keys()).sort((a, b) => a - b).forEach(wk => {
    const rows = byWeek.get(wk);
    const wkTotal = rows.reduce((n, r) => n + r.items.length, 0);
    const wkDone = rows.reduce(
      (n, r) => n + r.items.filter(it => isSolved(it.loc)).length, 0
    );
    const isCurrent = wk === curWk;
    const isOpen = fullPlanOpenWeeks.has(wk);

    const weekWrap = document.createElement("div");
    weekWrap.className = "plan-week" + (isCurrent ? " current" : "");

    const header = document.createElement("div");
    header.className = "plan-week-header" + (isOpen ? " open" : "");
    const chevron = document.createElement("span");
    chevron.className = "plan-week-chevron";
    chevron.textContent = "▶";
    const wkLabel = document.createElement("span");
    wkLabel.className = "plan-week-label";
    wkLabel.textContent = `Week ${wk}`;
    if (isCurrent) {
      const tag = document.createElement("span");
      tag.className = "plan-week-tag";
      tag.textContent = "current";
      wkLabel.appendChild(document.createTextNode(" "));
      wkLabel.appendChild(tag);
    }
    const wkStats = document.createElement("span");
    wkStats.className = "plan-week-stats";
    wkStats.textContent = `${wkDone} / ${wkTotal}`;
    header.appendChild(chevron);
    header.appendChild(wkLabel);
    header.appendChild(wkStats);
    header.addEventListener("click", () => {
      if (fullPlanOpenWeeks.has(wk)) fullPlanOpenWeeks.delete(wk);
      else fullPlanOpenWeeks.add(wk);
      renderPlanPanel();
    });
    weekWrap.appendChild(header);

    if (isOpen) {
      const body = document.createElement("div");
      body.className = "plan-week-body";
      rows.forEach(r => {
        const dayGroup = document.createElement("div");
        dayGroup.className = "plan-day-group";
        const dayLabel = document.createElement("div");
        dayLabel.className = "plan-day-label";
        dayLabel.textContent = `${r.dy} · ${fmtDate(r.dt)}`;
        dayGroup.appendChild(dayLabel);
        r.items.forEach(it => dayGroup.appendChild(renderPlanItem(it, r)));
        body.appendChild(dayGroup);
      });
      weekWrap.appendChild(body);
    }
    list.appendChild(weekWrap);
  });
}

function renderPlanPanel() {
  const cat = categorizePlan();
  const title = document.getElementById("plan-title");
  const meta = document.getElementById("plan-meta");
  const tabsEl = document.getElementById("plan-tabs");

  // Title + meta
  const todayDateStr = fmtDate(cat.today);
  const startDt = parseDate(PLAN_START);
  if (cat.todayISO < PLAN_START) {
    const dleft = diffDays(startDt, cat.today);
    title.textContent = "Plan";
    meta.textContent = `${todayDateStr} · starts ${fmtDate(startDt)} (in ${dleft} day${dleft === 1 ? "" : "s"})`;
  } else if (cat.todayRows.length) {
    const r = cat.todayRows[0];
    title.textContent = `Plan — Week ${r.wk} · ${r.dy}`;
    meta.textContent = todayDateStr;
  } else {
    title.textContent = "Plan";
    meta.textContent = `${todayDateStr} · rest day (System Design / no DSA)`;
  }

  if (planTab === null) planTab = pickInitialTab(cat);

  // Tabs
  const tabs = [
    { id: "today",    label: "Today",    count: cat.todayItems.length, danger: false, bonus: false },
    { id: "backlog",  label: "Backlog",  count: cat.backlog.length,    danger: cat.backlog.length > 0, bonus: false },
    { id: "upcoming", label: "Upcoming", count: cat.upcoming ? cat.upcoming.items.length : 0, danger: false, bonus: false },
    { id: "extras",   label: "Extras",   count: cat.extras.length,     danger: false, bonus: cat.extras.length > 0 },
    { id: "full",     label: "Full Plan", count: PLAN_ROWS.reduce((n, r) => n + r.items.length, 0), danger: false, bonus: false },
  ];
  tabsEl.textContent = "";
  tabs.forEach(t => {
    const btn = document.createElement("button");
    btn.className = "plan-tab" + (t.danger ? " danger" : "") + (t.bonus ? " bonus" : "") + (planTab === t.id ? " active" : "");
    btn.textContent = t.label;
    const badge = document.createElement("span");
    badge.className = "badge";
    badge.textContent = t.count;
    btn.appendChild(badge);
    btn.addEventListener("click", () => { planTab = t.id; renderPlanPanel(); });
    tabsEl.appendChild(btn);
  });

  // Body
  if (planTab === "today") {
    if (!cat.todayRows.length && cat.todayISO < PLAN_START && cat.upcoming) {
      // Before plan starts — show tomorrow / next planned day preview
      const list = document.getElementById("plan-list");
      list.textContent = "";
      const wrap = document.createElement("div");
      wrap.className = "plan-day-group";
      const label = document.createElement("div");
      label.className = "plan-day-label";
      const pill = document.createElement("span");
      pill.className = "wk-pill";
      pill.textContent = "W" + cat.upcoming.wk;
      label.appendChild(pill);
      label.appendChild(document.createTextNode(`Starts ${cat.upcoming.dy} · ${fmtDate(cat.upcoming.dt)}`));
      wrap.appendChild(label);
      cat.upcoming.items.forEach(it => wrap.appendChild(renderPlanItem(it, cat.upcoming)));
      list.appendChild(wrap);
    } else {
      renderGroupedByDay(cat.todayItems);
    }
  } else if (planTab === "backlog") {
    renderGroupedByDay(cat.backlog);
  } else if (planTab === "upcoming") {
    if (!cat.upcoming) {
      const list = document.getElementById("plan-list");
      list.textContent = "";
      const empty = document.createElement("div");
      empty.className = "plan-empty";
      empty.textContent = "No upcoming work — 12-week plan complete.";
      list.appendChild(empty);
    } else {
      const items = cat.upcoming.items.map(it => ({ row: cat.upcoming, item: it }));
      renderGroupedByDay(items);
    }
  } else if (planTab === "full") {
    renderFullPlan(cat);
  } else if (planTab === "extras") {
    renderGroupedByDay(cat.extras);
  }
}
/* PLAN_PANEL_JS_END */






function loadState() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; }
  catch(e) { return {}; }
}

function saveState(st) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(st));
}

function getKey(si, pi) { return si + "-" + pi; }
function getNoteKey(si, pi) { return "n-" + si + "-" + pi; }
function getQuestionKey(si, pi) { return "q-" + si + "-" + pi; }

var state = loadState();
var currentFilter = "all";
var openSections = {};
var openNotes = {};
var openQuestions = {};

function autoResize(el) {
  el.style.height = "auto";
  el.style.height = el.scrollHeight + "px";
}

function buildProblemItem(p, si, pi) {
  var key = getKey(si, pi);
  var noteKey = getNoteKey(si, pi);
  var questionKey = getQuestionKey(si, pi);
  var isChecked = key in state ? !!state[key] : !!p.s;
  var note = state[noteKey] || p.n || "";
  var question = state[questionKey] || p.q || "";

  var wrapper = document.createDocumentFragment();

  var item = document.createElement("div");
  item.className = "problem-item" + (isChecked ? " completed" : "");

  var checkbox = document.createElement("input");
  checkbox.type = "checkbox";
  checkbox.className = "problem-checkbox";
  checkbox.checked = isChecked;
  checkbox.addEventListener("change", function() {
    toggleProblem(si, pi, this.checked);
  });

  var nameSpan = document.createElement("span");
  nameSpan.className = "problem-name";
  nameSpan.textContent = p.name;
  nameSpan.addEventListener("click", function() { checkbox.click(); });

  var diffSpan = document.createElement("span");
  diffSpan.className = "problem-difficulty diff-" + p.d;
  diffSpan.textContent = p.d;

  var questionBtn = document.createElement("button");
  questionBtn.className = "question-btn" + (question ? " has-content" : "");
  questionBtn.textContent = "question";

  var notesBtn = document.createElement("button");
  notesBtn.className = "notes-btn";
  notesBtn.textContent = "notes";

  item.appendChild(checkbox);
  item.appendChild(nameSpan);
  item.appendChild(diffSpan);
  item.appendChild(questionBtn);
  item.appendChild(notesBtn);

  var noteId = si + "-" + pi;

  var questionArea = document.createElement("textarea");
  questionArea.className = "question-area" + (openQuestions[noteId] ? " visible" : "");
  questionArea.placeholder = "Paste the problem statement here...";
  questionArea.value = question;
  questionArea.addEventListener("input", function() { autoResize(this); });
  questionArea.addEventListener("blur", function() {
    var qKey = getQuestionKey(si, pi);
    if (this.value.trim()) {
      state[qKey] = this.value.trim();
    } else {
      delete state[qKey];
    }
    saveState(state);
  });

  questionBtn.addEventListener("click", function() {
    var wasVisible = openQuestions[noteId];
    document.querySelectorAll(".question-area.visible, .notes-area.visible").forEach(function(el) {
      el.classList.remove("visible");
    });
    openNotes = {};
    openQuestions = {};
    if (!wasVisible) {
      questionArea.classList.add("visible");
      openQuestions[noteId] = true;
      autoResize(questionArea);
      questionArea.focus();
    }
  });

  var textarea = document.createElement("textarea");
  textarea.className = "notes-area" + (openNotes[noteId] ? " visible" : "");
  textarea.placeholder = "Add notes...";
  textarea.value = note;
  textarea.addEventListener("input", function() { autoResize(this); });
  textarea.addEventListener("blur", function() {
    saveNote(si, pi, this.value);
  });

  notesBtn.addEventListener("click", function() {
    var wasVisible = openNotes[noteId];
    document.querySelectorAll(".notes-area.visible, .question-area.visible").forEach(function(el) {
      el.classList.remove("visible");
    });
    openNotes = {};
    openQuestions = {};
    if (!wasVisible) {
      textarea.classList.add("visible");
      openNotes[noteId] = true;
      autoResize(textarea);
      textarea.focus();
    }
  });

  wrapper.appendChild(item);
  wrapper.appendChild(questionArea);
  wrapper.appendChild(textarea);
  return wrapper;
}

function render() {
  var container = document.getElementById("sections-container");
  container.textContent = "";

  var totalDone = 0;
  var totalAll = 0;

  DATA.forEach(function(section, si) {
    var sectionDone = 0;
    section.problems.forEach(function(_, pi) {
      var k = getKey(si, pi); if (k in state ? state[k] : section.problems[pi].s) sectionDone++;
    });
    totalDone += sectionDone;
    totalAll += section.problems.length;

    var filteredProblems = [];
    section.problems.forEach(function(p, pi) {
      var dominated = false;
      var fk = getKey(si, pi); var fChecked = fk in state ? !!state[fk] : !!p.s; if (currentFilter === "pending" && fChecked) dominated = true;
      if (currentFilter === "completed" && !fChecked) dominated = true;
      if (currentFilter === "easy" && p.d !== "easy") dominated = true;
      if (currentFilter === "medium" && p.d !== "medium") dominated = true;
      if (currentFilter === "hard" && p.d !== "hard") dominated = true;
      if (!dominated) filteredProblems.push({ p: p, pi: pi });
    });

    if (filteredProblems.length === 0 && currentFilter !== "all") return;

    var pct = section.problems.length > 0 ? (sectionDone / section.problems.length * 100) : 0;
    var isComplete = sectionDone === section.problems.length && section.problems.length > 0;

    var div = document.createElement("div");
    div.className = "section" + (openSections[si] ? " open" : "");

    var header = document.createElement("div");
    header.className = "section-header";
    (function(idx) {
      header.addEventListener("click", function() {
        openSections[idx] = !openSections[idx];
        div.classList.toggle("open");
      });
    })(si);

    var titleDiv = document.createElement("div");
    titleDiv.className = "section-title";

    var chevron = document.createElement("span");
    chevron.className = "chevron";
    chevron.textContent = "▶";

    var h3 = document.createElement("h3");
    h3.textContent = (isComplete ? "✓ " : "") + section.name;

    titleDiv.appendChild(chevron);
    titleDiv.appendChild(h3);

    var metaDiv = document.createElement("div");
    metaDiv.className = "section-meta";

    var countSpan = document.createElement("span");
    countSpan.className = "section-count";
    var doneSpan = document.createElement("span");
    doneSpan.className = "done-count";
    doneSpan.textContent = sectionDone;
    countSpan.appendChild(doneSpan);
    countSpan.appendChild(document.createTextNode(" / " + section.problems.length));

    var barDiv = document.createElement("div");
    barDiv.className = "section-bar";
    var barFill = document.createElement("div");
    barFill.className = "section-bar-fill";
    barFill.style.width = pct + "%";
    barDiv.appendChild(barFill);

    metaDiv.appendChild(countSpan);
    metaDiv.appendChild(barDiv);

    header.appendChild(titleDiv);
    header.appendChild(metaDiv);

    var listDiv = document.createElement("div");
    listDiv.className = "problem-list";

    filteredProblems.forEach(function(item) {
      listDiv.appendChild(buildProblemItem(item.p, si, item.pi));
    });

    div.appendChild(header);
    div.appendChild(listDiv);
    container.appendChild(div);
  });

  var remaining = totalAll - totalDone;

  document.getElementById("stat-total").textContent = totalAll;
  document.getElementById("stat-done").textContent = totalDone;
  document.getElementById("stat-remaining").textContent = remaining;

  var pctAll = totalAll > 0 ? (totalDone / totalAll * 100) : 0;
  document.getElementById("overall-pct").textContent = Math.round(pctAll) + "%";
  document.getElementById("overall-fill").style.width = pctAll + "%";
  renderPlanPanel();
}

var NOTE_TEMPLATE =
  "#Brute Force:\n" +
  "1. \n" +
  "TC -> O(), SC -> O()\n" +
  "\n" +
  "#Better Approach:\n" +
  "1. \n" +
  "TC -> O(), SC -> O()\n" +
  "\n" +
  "#Optimal Approach:\n" +
  "1. \n" +
  "TC -> O(), SC -> O()\n" +
  "\n" +
  "#KEY INSIGHT:\n" +
  "- ";

function toggleProblem(si, pi, checked) {
  var key = getKey(si, pi);
  var noteKey = getNoteKey(si, pi);
  if (checked) {
    state[key] = true;
    if (!state[noteKey]) {
      state[noteKey] = NOTE_TEMPLATE;
    }
  } else {
    delete state[key];
  }
  saveState(state);
  render();
}

function saveNote(si, pi, value) {
  var key = getNoteKey(si, pi);
  if (value.trim()) {
    state[key] = value.trim();
  } else {
    delete state[key];
  }
  saveState(state);
}

document.getElementById("reset-btn").addEventListener("click", function() {
  if (confirm("Reset all progress? Notes will be preserved.")) {
    var preserved = {};
    Object.keys(state).forEach(function(k) {
      if (k.indexOf("n-") === 0 || k.indexOf("q-") === 0) preserved[k] = state[k];
    });
    state = preserved;
    saveState(state);
    openSections = {};
    render();
  }
});

document.querySelectorAll(".filter-btn").forEach(function(btn) {
  btn.addEventListener("click", function() {
    document.querySelectorAll(".filter-btn").forEach(function(b) {
      b.classList.remove("active");
    });
    btn.classList.add("active");
    currentFilter = btn.dataset.filter;
    render();
  });
});

render();
</script>
