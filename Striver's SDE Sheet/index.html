  {
    name: "Graph Part-II", problems: [
      { name: "Strongly Connected Component(using Kosaraju's algo)", d: "hard"                                                                                                                  , q: "Strongly Connected Component (using Kosaraju's algo)\nYou are given a directed graph with V vertices, numbered from 0 to V-1, and its adjacency\nlist Adj, where Adj[i] contains all vertices j such that there is a directed edge from\nvertex i to vertex j. Your task is to find the number of strongly connected components\n(SCCs) in the graph. A strongly connected component is a maximal set of vertices such\nthat every vertex in the set is reachable from every other vertex in the set via\ndirected paths.\n\nExamples:\nExample 1:\nInput: V = 5, Adj = [[2, 3], [0], [1], [4], []]\nOutput: 3\nExplanation: The three SCCs are {0, 1, 2} (the cycle 0->2->1->0), {3} and {4}.\n\nExample 2:\nInput: V = 8, Adj = [[1], [2], [0, 3], [4], [5, 7], [6], [4, 7], []]\nOutput: 4\nExplanation: The four SCCs are {0, 1, 2}, {3}, {4, 5, 6} and {7}.\n\nConstraints:\n1 <= V <= 5000\n0 <= E <= V*(V-1)\n0 <= ai, bi <= V-1", n: "#Brute Force:\n1.\nTC -> O(), SC -> O()\n\n#Better Approach:\n1.\nTC -> O(), SC -> O()\n\n#Optimal Approach:\n1.\nTC -> O(), SC -> O()\n\n#KEY INSIGHT:\n-" },
      { name: "Dijkstra's algorithm", d: "hard"                                                                                                                  , q: "Dijkstra's algorithm\nGiven a weighted, undirected graph of V vertices, numbered from 0 to V-1, and a 2D\nvector/array which represents the edges. Each entry in edges[i] is of the form\n[u, v, weight], where u, v represent the vertices having an undirected edge between them,\nand weight is the weight of the edge between u and v.\nGiven a source node S, find the shortest distance of all the vertices from the source\nvertex S. Return a list of integers denoting the shortest distance between each node and\nsource vertex S. If a vertex is not reachable from the source then its distance will\nbe 10^9.\n\nExamples:\nExample 1:\nInput: V = 2, edges = [[0, 1, 9]], S = 0\nOutput: [0, 9]\nExplanation: The shortest distance from node 0 (source) to node 0 is 0, and the shortest\ndistance from node 0 to node 1 is 9.\n\nExample 2:\nInput: V = 3, edges = [[0, 1, 1], [0, 2, 6], [1, 2, 3]], S = 2\nOutput: [4, 3, 0]\nExplanation:\nFor node 0, the shortest path is 2->1->0 (distance=4).\nFor node 1, the shortest path is 2->1 (distance=3).\nFor node 2 (the source), the distance is 0.\n\nConstraints:\n1 <= V <= 10000\n0 <= edges[i][j] <= 10000\n1 <= edges.size() <= (V*(V-1))/2\n0 <= S < V", n: "#Brute Force:\n1.\nTC -> O(), SC -> O()\n\n#Better Approach:\n1.\nTC -> O(), SC -> O()\n\n#Optimal Approach:\n1.\nTC -> O(), SC -> O()\n\n#KEY INSIGHT:\n-" },
      { name: "Bellman ford algorithm", d: "hard"                                                                                                                  , q: "Bellman ford algorithm\nGiven a weighted and directed graph of V vertices and E edges. An edge is represented as\n[ai, bi, wi], meaning there is a directed edge from ai to bi having weight wi. Find the\nshortest distance of all the vertices from the source vertex S. If a vertex can't be\nreached from S then mark the distance as 10^9.\nIf the graph contains a negative cycle then return -1 in a list.\n\nExamples:\nExample 1:\nInput: V = 6, Edges = [[3, 2, 6], [5, 3, 1], [0, 1, 5], [1, 5, -3], [1, 2, -2], [3, 4, -2],\n       [2, 4, 3]], S = 0\nOutput: 0 5 3 3 1 2\nExplanation:\nFor node 1, shortest path is 0->1 (distance=5).\nFor node 2, shortest path is 0->1->2 (distance=3).\nFor node 3, shortest path is 0->1->5->3 (distance=3).\nFor node 4, shortest path is 0->1->5->3->4 (distance=1).\nFor node 5, shortest path is 0->1->5 (distance=2).\n\nExample 2:\nInput: V = 2, Edges = [[0, 1, 9]], S = 0\nOutput: 0 9\nExplanation: For node 1, the shortest path is 0->1 (distance=9).\n\nConstraints:\n1 <= V <= 500\n1 <= E <= V*(V-1)\n-1000 <= wi <= 1000\n0 <= S < V", n: "#Brute Force:\n1.\nTC -> O(), SC -> O()\n\n#Better Approach:\n1.\nTC -> O(), SC -> O()\n\n#Optimal Approach:\n1.\nTC -> O(), SC -> O()\n\n#KEY INSIGHT:\n-" },
      { name: "Floyd Warshall Algorithm", d: "hard"                                                                                                                  , q: "Floyd Warshall Algorithm\nGiven a graph of V vertices numbered from 0 to V-1. Find the shortest distances between\nevery pair of vertices in a given edge-weighted directed graph. The graph is represented\nas an adjacency matrix of size n x n. Matrix[i][j] denotes the weight of the edge from\ni to j. If Matrix[i][j] = -1, it means there is no edge from i to j.\n\nExamples:\nExample 1:\nInput: matrix = [[0, 2, -1, -1], [1, 0, 3, -1], [-1, -1, 0, 1], [3, 5, 4, 0]]\nOutput: [[0, 2, 5, 6], [1, 0, 3, 4], [4, 6, 0, 1], [3, 5, 4, 0]]\nExplanation: matrix[0][0] is storing the distance from vertex 0 to vertex 0, the distance\nfrom vertex 0 to vertex 1 is 2, and so on.\n\nExample 2:\nInput: matrix = [[0, 25], [-1, 0]]\nOutput: [[0, 25], [-1, 0]]\nExplanation: The matrix already contains the shortest distances.\n\nConstraints:\n1 <= n <= 100\n-1 <= matrix[i][j] <= 1000", n: "#Brute Force:\n1.\nTC -> O(), SC -> O()\n\n#Better Approach:\n1.\nTC -> O(), SC -> O()\n\n#Optimal Approach:\n1.\nTC -> O(), SC -> O()\n\n#KEY INSIGHT:\n-" },
      { name: "MST using Prim's Algo", d: "hard"                                                                                                                  , q: "MST using Prim's Algo\nGiven a weighted, undirected, and connected graph of V vertices (numbered 0 to V-1) and E\nedges, where each edge is represented as [u, v, w] (an undirected edge between u and v of\nweight w), find the sum of the edge weights of the Minimum Spanning Tree (MST) of the graph.\nA spanning tree is a subset of exactly V-1 edges that connects all V vertices without\nforming any cycle; the MST is the spanning tree whose total edge weight is minimum. Multiple\nMSTs may exist, but they all share the same minimum total weight, so the answer is unique.\n\nExamples:\nExample 1:\nInput: V = 3, edges = [[0, 1, 2], [1, 2, 3], [0, 2, 1]]\nOutput: 3\nExplanation: The MST uses edges (0,2) with weight 1 and (0,1) with weight 2, total = 3.\nThe other two spanning trees weigh 4 ({(0,2), (1,2)}) and 5 ({(0,1), (1,2)}).\n\nExample 2:\nInput: V = 5, edges = [[0, 1, 2], [0, 2, 1], [1, 2, 1], [2, 3, 2], [3, 4, 1], [4, 2, 2]]\nOutput: 5\nExplanation: One MST is {(0,2), (1,2), (3,4), (2,3)} with total weight 1 + 1 + 1 + 2 = 5.", n: "#Brute Force:\n1.\nTC -> O(), SC -> O()\n\n#Better Approach:\n1.\nTC -> O(), SC -> O()\n\n#Optimal Approach:\n1.\nTC -> O(), SC -> O()\n\n#KEY INSIGHT:\n-" },
      { name: "MST using Kruskal's Algo", d: "hard"                                                                                                                  , q: "MST using Kruskal's Algo\nGiven a weighted, undirected, and connected graph of V vertices and E\nedges, find the sum of weights of the edges of the Minimum Spanning\nTree (MST). An MST is a subset of E edges that connects all V vertices\nwith the minimum total edge weight and contains no cycles.\nUse Kruskal's algorithm:\n  1. Sort all edges in non-decreasing order of weight.\n  2. Initialize Union-Find (Disjoint Set Union) with V components.\n  3. Iterate sorted edges; if the endpoints are in different components,\n     union them and add the edge weight to the MST total.\n  4. Stop when V-1 edges have been added.\n\nExamples:\nExample 1:\nInput: V = 4, edges = [[0, 1, 1], [1, 2, 2], [2, 3, 3], [0, 3, 4]]\nOutput: 6\nExplanation:\nEdges included in the MST (Minimum Spanning Tree) are:\n- [0, 1, 1] with weight 1\n- [1, 2, 2] with weight 2\n- [2, 3, 3] with weight 3\nThe total weight of the MST is 1 + 2 + 3 = 6. These edges form a spanning tree that\nconnects all vertices (0, 1, 2, 3) with the minimum possible total edge weight.\n\nExample 2:\nInput: V = 3, edges = [[0, 1, 5], [1, 2, 10], [2, 0, 15]]\nOutput: 15\nExplanation:\nEdges included in the MST are:\n- [0, 1, 5] with weight 5\n- [1, 2, 10] with weight 10\nThe total weight of the MST is 5 + 10 = 15.", n: "#Brute Force:\n1.\nTC -> O(), SC -> O()\n\n#Better Approach:\n1.\nTC -> O(), SC -> O()\n\n#Optimal Approach:\n1.\nTC -> O(), SC -> O()\n\n#KEY INSIGHT:\n-" }
    ]
  },
  {
    name: "Dynamic Programming", problems: [
      { name: "Max Product Subarray", d: "hard"                                                                                                                  , q: "Max Product Subarray\nGiven an integer array nums (containing positive, negative, and zero\nvalues), find a contiguous non-empty subarray whose product is the\nlargest, and return that product. The test cases are generated so that\nthe answer fits in a 32-bit integer.\n\nExamples:\nExample 1:\nInput: nums = [2, 3, -2, 4]\nOutput: 6\nExplanation: [2, 3] has the largest product 6.\n\nExample 2:\nInput: nums = [-2, 0, -1]\nOutput: 0\nExplanation: The result cannot be 2 because [-2, -1] is not contiguous.\n\nConstraints:\n1 <= nums.length <= 2 * 10^4\n-10 <= nums[i] <= 10\nThe product of any prefix or suffix of nums fits in a 32-bit integer.", n: "#Brute Force:\n1.\nTC -> O(), SC -> O()\n\n#Better Approach:\n1.\nTC -> O(), SC -> O()\n\n#Optimal Approach:\n1.\nTC -> O(), SC -> O()\n\n#KEY INSIGHT:\n-" },
      { name: "Longest Increasing Subsequence", d: "medium"                                                                                                                  , q: "Longest Increasing Subsequence\nGiven an integer array nums, return the length of the longest STRICTLY\nincreasing subsequence. A subsequence is a sequence derived from the\narray by deleting some or no elements without changing the order of the\nremaining elements.\n\nExamples:\nExample 1:\nInput: nums = [10, 9, 2, 5, 3, 7, 101, 18]\nOutput: 4\nExplanation: The longest increasing subsequence is [2, 3, 7, 101], and its length is 4.\n\nExample 2:\nInput: nums = [0, 1, 0, 3, 2, 3]\nOutput: 4\nExplanation: The longest increasing subsequence is [0, 1, 2, 3], and its length is 4.", n: "#Brute Force:\n1.\nTC -> O(), SC -> O()\n\n#Better Approach:\n1.\nTC -> O(), SC -> O()\n\n#Optimal Approach:\n1.\nTC -> O(), SC -> O()\n\n#KEY INSIGHT:\n-" },
      { name: "Longest common subsequence", d: "hard"                                                                                                                  , q: "Longest common subsequence\nGiven two strings str1 and str2, print the longest common subsequence\nof the two strings. A subsequence of a string is a list of characters of\nthe string where zero or more characters in the original string are\ndeleted without disturbing the relative ordering of the remaining\ncharacters. If multiple LCS exist, return any one. If no common\nsubsequence exists, return \"\".\n\nExamples:\nExample 1:\nInput: str1 = \"abcd\", str2 = \"bdef\"\nOutput: \"bd\"\n\nExample 2:\nInput: str1 = \"apple\", str2 = \"waffle\"\nOutput: \"ale\"\n\nExamples:\nInput: str1 = \"abcd\", str2=\"bdef\"\nOutput: \"bd\"\nExplanation: LCS of two strings is \"bd\".\n\nInput: str1 = \"apple\" str2 = \"waffle\"\nOutput: \"ale\"\nExplanation: LCS of two strings is \"ale\".", n: "#Brute Force:\n1.\nTC -> O(), SC -> O()\n\n#Better Approach:\n1.\nTC -> O(), SC -> O()\n\n#Optimal Approach:\n1.\nTC -> O(), SC -> O()\n\n#KEY INSIGHT:\n-" },
      { name: "0 and 1 Knapsack", d: "hard"                                                                                                                  , q: "0 and 1 Knapsack\nA thief wants to rob a store. He is carrying a bag of capacity W. The\nstore has 'n' items. Item i has weight wt[i] and value val[i]. He can\neither pick an item entirely or leave it out (0/1 knapsack — items\ncannot be split). What is the maximum value he can carry such that the\ntotal weight is <= W?\n\nExamples:\nExample 1:\nInput: val = [60, 100, 120], wt = [10, 20, 30], W = 50\nOutput: 220\nExplanation: Select items with weights 20 and 30 for a total value of 100 + 120 = 220.\n\nExample 2:\nInput: val = [10, 40, 30, 50], wt = [5, 4, 6, 3], W = 10\nOutput: 90\nExplanation: Select items with weights 4 and 3 for a total value of 40 + 50 = 90.", n: "#Brute Force:\n1.\nTC -> O(), SC -> O()\n\n#Better Approach:\n1.\nTC -> O(), SC -> O()\n\n#Optimal Approach:\n1.\nTC -> O(), SC -> O()\n\n#KEY INSIGHT:\n-" },
      { name: "Edit distance", d: "hard"                                                                                                                  , q: "Edit distance\nGiven two strings S1 and S2, we need to convert S1 to S2. The following\nthree operations are allowed:\n  1. Deletion of a character.\n  2. Replacement of a character with another character.\n  3. Insertion of a character.\nFind the minimum number of operations required to convert S1 to S2.\n\nExamples:\nExample 1:\nInput: start = \"planet\", target = \"plan\"\nOutput: 2\nExplanation:\nTo transform \"planet\" into \"plan\", the following operations are required:\n1. Delete the character 'e': \"planet\" -> \"plan\"\n2. Delete the character 't': \"plan\" -> \"plan\"\nThus, a total of 2 operations are needed.\n\nExample 2:\nInput: start = \"abcdefg\", target = \"azced\"\nOutput: 4\nExplanation:\nTo transform \"abcdefg\" into \"azced\", the following operations are required:\n1. Replace 'b' with 'z': \"abcdefg\" -> \"azcdefg\"\n2. Delete 'd': \"azcdefg\" -> \"azcefg\"\n3. Delete 'f': \"azcefg\" -> \"azceg\"\n4. Replace 'g' with 'd': \"azceg\" -> \"azced\"\nThus, a total of 4 operations are needed.", n: "#Brute Force:\n1.\nTC -> O(), SC -> O()\n\n#Better Approach:\n1.\nTC -> O(), SC -> O()\n\n#Optimal Approach:\n1.\nTC -> O(), SC -> O()\n\n#KEY INSIGHT:\n-" },
      { name: "Maximum Sum Increasing Subsequence", d: "medium"                                                                                                                  , q: "Maximum Sum Increasing Subsequence\nGiven an array arr[] of positive integers, find the maximum possible\nsum of a subsequence such that the elements of the subsequence are in\nstrictly increasing order. The subsequence does not need to be\ncontiguous. You must choose elements such that the resulting sequence\nis strictly increasing AND the sum of the chosen elements is maximum.\n\nExamples:\nExample 1:\nInput: arr = [1, 101, 2, 3, 100, 4, 5]\nOutput: 106\nExplanation: The increasing subsequence with max sum is [1, 2, 3, 100],\nsum = 106.\n\nExample 2:\nInput: arr = [3, 4, 5, 10]\nOutput: 22\nExplanation: The whole array is increasing; sum = 3 + 4 + 5 + 10 = 22.\n\nConstraints:\n1 <= arr.length <= 1000\n1 <= arr[i] <= 10^5", n: "#Brute Force:\n1.\nTC -> O(), SC -> O()\n\n#Better Approach:\n1.\nTC -> O(), SC -> O()\n\n#Optimal Approach:\n1.\nTC -> O(), SC -> O()\n\n#KEY INSIGHT:\n-" },
      { name: "Matrix chain multiplication", d: "hard"                                                                                                                  , q: "Matrix chain multiplication\nGiven a chain of n matrices A1, A2, ..., An, denoted by an array of\nsize n+1 where arr[i-1] x arr[i] gives the dimensions of matrix A_i,\nfind the minimum number of scalar multiplications needed to multiply\nthe chain. You only need to compute the cost, not the actual\nparenthesization.\nTwo matrices A (p x q) and B (q x r) can be multiplied in p*q*r\noperations to produce a (p x r) matrix.\n\nExamples:\nInput : [40, 20, 30, 10, 30]\nOutput : 26000\nExplanation : Best parenthesization is ( (A1 x (A2 x A3)) x A4 ).\n\nInput : [10, 20, 30, 40, 30]\nOutput : 30000\nExplanation : Optimal parenthesization minimizes cost.", n: "#Brute Force:\n1.\nTC -> O(), SC -> O()\n\n#Better Approach:\n1.\nTC -> O(), SC -> O()\n\n#Optimal Approach:\n1.\nTC -> O(), SC -> O()\n\n#KEY INSIGHT:\n-" }
    ]
  },
  {
    name: "Dynamic Programming Part-II", problems: [
      { name: "Minimum sum path in the matrix, (count paths and similar type do, also backtrack to find the Minimum path)", d: "medium"                                           , q: "Minimum sum path in the matrix, (count paths and similar type do, also backtrack to find the Minimum path)\nGiven an m x n grid filled with non-negative numbers, find a path from\ntop-left to bottom-right which minimizes the sum of all numbers along\nits path. You can only move either DOWN or RIGHT at any point in time.\nReturn that minimum sum.\n\n(The Striver sheet groups several related variants here: count of\nunique paths, also backtrack to recover the actual minimum path, etc.)\n\nExamples:\nExample 1:\nInput: grid = [[1,3,1],[1,5,1],[4,2,1]]\nOutput: 7\nExplanation: 1 → 3 → 1 → 1 → 1 minimizes the sum.\n\nExample 2:\nInput: grid = [[1,2,3],[4,5,6]]\nOutput: 12\nExplanation: 1 → 2 → 3 → 6 (path sum 12).\n\nConstraints:\nm == grid.length, n == grid[i].length\n1 <= m, n <= 200\n0 <= grid[i][j] <= 200", n: "#Brute Force:\n1.\nTC -> O(), SC -> O()\n\n#Better Approach:\n1.\nTC -> O(), SC -> O()\n\n#Optimal Approach:\n1.\nTC -> O(), SC -> O()\n\n#KEY INSIGHT:\n-" },
      { name: "Coin change II", d: "hard"                                                                                                                  , q: "Coin change II\nWe are given an array Arr with N distinct coins and a target. We have\nan infinite supply of each coin denomination. We need to find the\nnumber of distinct ways we can sum up coin values to make the target.\nOrder of coins does NOT matter (i.e., [1, 2, 1] and [1, 1, 2] count as\nthe same combination).\n\nExamples:\nExample 1:\nInput: coins = [2, 4,10], amount = 10\nOutput: 4\nExplanation: The four combinations are:\n10 = 10\n10 = 4 + 4 + 2\n10 = 4 + 2 + 2 + 2\n10 = 2 + 2 + 2 + 2 + 2\n\nExample 2:\nInput: coins = [5], amount = 5\nOutput: 1\nExplanation: There is one combination: 5 = 5.", n: "#Brute Force:\n1.\nTC -> O(), SC -> O()\n\n#Better Approach:\n1.\nTC -> O(), SC -> O()\n\n#Optimal Approach:\n1.\nTC -> O(), SC -> O()\n\n#KEY INSIGHT:\n-" },
      { name: "Subset sum equals to target", d: "hard"                                                                                                                  , q: "Subset sum equals to target\nGiven an array of non-negative integers `arr` and an integer `target`, determine whether\nthere exists a subset of `arr` whose elements sum exactly to `target`. Return true if\nsuch a subset exists, otherwise false.\n\nExamples:\nExample 1:\nInput: arr = [5, 2, 1], target = 8\nOutput: true\nExplanation: The subset [5, 2, 1] sums to 8.\n\nExample 2:\nInput: arr = [2, 3, 5], target = 4\nOutput: false\nExplanation: No subset of [2, 3, 5] sums to 4.", n: "#Brute Force:\n1.\nTC -> O(), SC -> O()\n\n#Better Approach:\n1.\nTC -> O(), SC -> O()\n\n#Optimal Approach:\n1.\nTC -> O(), SC -> O()\n\n#KEY INSIGHT:\n-" },
      { name: "Rod cutting problem", d: "hard"                                                                                                                  , q: "Rod cutting problem\nGiven a rod of length N inches and an array price[] where price[i]\ndenotes the value of a piece of rod of length (i+1) inches (so\nprice[0] is the price of a 1-inch piece, price[N-1] is the price of an\nN-inch piece). Determine the maximum value obtainable by cutting the\nrod into smaller pieces and selling them. You may cut the rod into any\nnumber of pieces (including 0 cuts / keeping it whole), and each piece\nsize has its corresponding price from the array.\n\nExamples:\nInput : price = [1, 6, 8, 9, 10, 19, 7, 20], N = 8\nOutput :25\nExplanation :Cut the rod into lengths of 2 and 6 for a total price of 6 + 19= 25.\n\nInput :price = [1, 5, 8, 9], N = 4\nOutput :10\nExplanation :Cut the rod into lengths of 2 and 2 for a total price of 5 + 5 = 10.", n: "#Brute Force:\n1.\nTC -> O(), SC -> O()\n\n#Better Approach:\n1.\nTC -> O(), SC -> O()\n\n#Optimal Approach:\n1.\nTC -> O(), SC -> O()\n\n#KEY INSIGHT:\n-" },
      { name: "Super Egg Drop", d: "medium"                                                                                                                  , q: "Super Egg Drop\nYou are given n identical eggs and a building with k floors numbered\nfrom 1 to k. There exists an unknown floor f (0 <= f <= k) such that:\n  - Any egg dropped from a floor HIGHER than f will break.\n  - Any egg dropped from floor f or BELOW will not break.\nIn each move, you may take an unbroken egg and drop it from any floor\nx (1 <= x <= k). If the egg breaks, you can no longer use it. If it\ndoesn't break, you may reuse it in subsequent moves. Your goal is to\ndetermine the value of f with CERTAINTY. Return the minimum number of\nmoves required to determine f, in the worst case.\n\nExamples:\nExample 1:\nInput: n = 1, k = 2\nOutput: 2\nExplanation: With 1 egg, you must try floors one-by-one bottom-up.\n\nExample 2:\nInput: n = 2, k = 6\nOutput: 3\n\nExample 3:\nInput: n = 3, k = 14\nOutput: 4\n\nConstraints:\n1 <= n <= 100\n1 <= k <= 10^4", n: "#Brute Force:\n1.\nTC -> O(), SC -> O()\n\n#Better Approach:\n1.\nTC -> O(), SC -> O()\n\n#Optimal Approach:\n1.\nTC -> O(), SC -> O()\n\n#KEY INSIGHT:\n-" },
      { name: "Word Break", d: "medium"                                                                                                                  , q: "Word Break\nGiven a string s and a dictionary of strings wordDict, return true if\ns can be segmented into a space-separated sequence of one or more\ndictionary words; otherwise return false.\nNote: The same word in the dictionary can be used multiple times in\nthe segmentation.\n\nExamples:\nExample 1:\nInput: s = \"leetcode\", wordDict = [\"leet\", \"code\"]\nOutput: true\nExplanation: \"leetcode\" can be segmented as \"leet code\".\n\nExample 2:\nInput: s = \"applepenapple\", wordDict = [\"apple\", \"pen\"]\nOutput: true\nExplanation: \"apple pen apple\" — \"apple\" reused.\n\nExample 3:\nInput: s = \"catsandog\", wordDict = [\"cats\", \"dog\", \"sand\", \"and\", \"cat\"]\nOutput: false\n\nConstraints:\n1 <= s.length <= 300\n1 <= wordDict.length <= 1000\n1 <= wordDict[i].length <= 20\ns and wordDict[i] consist of only lowercase English letters.\nAll the strings of wordDict are unique.", n: "#Brute Force:\n1.\nTC -> O(), SC -> O()\n\n#Better Approach:\n1.\nTC -> O(), SC -> O()\n\n#Optimal Approach:\n1.\nTC -> O(), SC -> O()\n\n#KEY INSIGHT:\n-" },
      { name: "Palindrome Partitioning (MCM Variation)", d: "hard"                                                                                                                  , q: "Palindrome Partitioning (MCM Variation)\nGiven a string s, return the minimum number of cuts needed for a\npalindrome partitioning of s. A partitioning of s is a palindrome\npartitioning if every substring of the partition is a palindrome. The\nnumber of cuts is one less than the number of partitions.\n(This is the DP / MCM-style minimization variant — different from the\nRecursion variant which returns all partitions.)\n\nExamples:\nExample 1:\nInput: s = \"aab\"\nOutput: 1\nExplanation: One cut gives [\"aa\", \"b\"], both palindromes.\n\nExample 2:\nInput: s = \"a\"\nOutput: 0\nExplanation: A single character is already a palindrome — 0 cuts needed.\n\nExample 3:\nInput: s = \"ab\"\nOutput: 1\nExplanation: [\"a\", \"b\"] needs 1 cut.\n\nConstraints:\n1 <= s.length <= 2000\ns consists of lowercase English letters only.", n: "#Brute Force:\n1.\nTC -> O(), SC -> O()\n\n#Better Approach:\n1.\nTC -> O(), SC -> O()\n\n#Optimal Approach:\n1.\nTC -> O(), SC -> O()\n\n#KEY INSIGHT:\n-" },
      { name: "Maximum Profit in Job Scheduling", d: "medium"                                                                                                                  , q: "Maximum Profit in Job Scheduling\nYou are given n jobs, where each job i is represented by three values:\n  - startTime[i]: the start time of the job\n  - endTime[i]:   the end time of the job\n  - profit[i]:    the profit earned from completing the job\nYou cannot take two jobs that overlap in time (jobs that share any\ncommon point in time other than touching endpoints count as\noverlapping — i.e., a job ending at time X and another starting at time\nX is allowed). Return the maximum profit you can take so that no two\njobs in the subset overlap.\n\nExamples:\nExample 1:\nInput: startTime=[1,2,3,3], endTime=[3,4,5,6], profit=[50,10,40,70]\nOutput: 120\nExplanation: Take jobs 1 and 4 -> profit 50 + 70 = 120.\n\nExample 2:\nInput: startTime=[1,2,3,4,6], endTime=[3,5,10,6,9], profit=[20,20,100,70,60]\nOutput: 150\nExplanation: Take jobs 1, 4, 5 -> profit 20 + 70 + 60 = 150.\n\nConstraints:\n1 <= startTime.length == endTime.length == profit.length <= 5 * 10^4\n1 <= startTime[i] < endTime[i] <= 10^9\n1 <= profit[i] <= 10^4", n: "#Brute Force:\n1.\nTC -> O(), SC -> O()\n\n#Better Approach:\n1.\nTC -> O(), SC -> O()\n\n#Optimal Approach:\n1.\nTC -> O(), SC -> O()\n\n#KEY INSIGHT:\n-" }
    ]
  },
  {
    name: "Trie", problems: [
      { name: "Trie Implementation and Operations", d: "hard"                                                                                                                  , q: "Trie Implementation and Operations\nImplement the Trie class:\n- Trie(): Initializes the trie object.\n- void insert(String word): Inserts the string word into the trie.\n- boolean search(String word): Returns true if the string word is in the trie (i.e., was\n  inserted before), and false otherwise.\n- boolean startsWith(String prefix): Returns true if there is a previously inserted string\n  word that has the prefix prefix, and false otherwise.\n\nExamples:\nExample 1:\nInput:\n[\"Trie\", \"insert\", \"search\", \"search\", \"startsWith\", \"insert\", \"search\"]\n[ [], \"apple\", \"apple\", \"app\", \"app\", \"app\", \"app\" ]\nOutput: [null, null, true, false, true, null, true]\nExplanation:\nTrie trie = new Trie()\ntrie.insert(\"apple\")\ntrie.search(\"apple\")   // return True\ntrie.search(\"app\")     // return False\ntrie.startsWith(\"app\") // return True\ntrie.insert(\"app\")\ntrie.search(\"app\")     // return True\n\nExample 2:\nInput:\n[\"Trie\", \"insert\", \"insert\", \"startsWith\", \"search\"]\n[ [], \"takeu\", \"banana\", \"bana\", \"takeu\" ]\nOutput: [null, null, null, true, true]\nExplanation:\nTrie trie = new Trie()\ntrie.insert(\"takeu\")\ntrie.insert(\"banana\")\ntrie.startsWith(\"bana\") // return True\ntrie.search(\"takeu\")    // return True\n\nConstraints:\n- 1 <= word.length, prefix.length <= 2000\n- word and prefix consist only of lowercase English letters.\n- At most 3*10^4 calls in total will be made to insert, search and startsWith.", n: "#Brute Force:\n1.\nTC -> O(), SC -> O()\n\n#Better Approach:\n1.\nTC -> O(), SC -> O()\n\n#Optimal Approach:\n1.\nTC -> O(), SC -> O()\n\n#KEY INSIGHT:\n-" },
      { name: "Trie Implementation and Advanced Operations", d: "hard"                                                                                                                  , q: "Trie Implementation and Advanced Operations\nImplement \"TRIE\" data structure from scratch with the following functions.\n- Trie(): Initialize the object of this \"TRIE\" data structure.\n- insert(\"WORD\"): Insert the string \"WORD\" into this \"TRIE\" data structure.\n- countWordsEqualTo(\"WORD\"): Return how many times this \"WORD\" is present in this \"TRIE\".\n- countWordsStartingWith(\"PREFIX\"): Return how many words are there in this \"TRIE\" that have\n  the string \"PREFIX\" as a prefix.\n- erase(\"WORD\"): Delete one occurrence of the string \"WORD\" from the \"TRIE\".\n\nExamples:\nExample 1:\nInput:\n[\"Trie\", \"insert\", \"countWordsEqualTo\", \"insert\", \"countWordsStartingWith\", \"erase\",\n \"countWordsStartingWith\"]\n[\"apple\", \"apple\", \"app\", \"app\", \"apple\", \"app\"]\nOutput: [null, null, 1, null, 2, null, 1]\nExplanation:\nTrie trie = new Trie()\ntrie.insert(\"apple\")\ntrie.countWordsEqualTo(\"apple\")      // return 1\ntrie.insert(\"app\")\ntrie.countWordsStartingWith(\"app\")   // return 2\ntrie.erase(\"apple\")\ntrie.countWordsStartingWith(\"app\")   // return 1\n\nExample 2:\nInput:\n[\"Trie\", \"insert\", \"countWordsEqualTo\", \"insert\", \"erase\", \"countWordsStartingWith\"]\n[\"mango\", \"apple\", \"app\", \"app\", \"mango\"]\nOutput: [null, null, 0, null, null, 1]\nExplanation:\nTrie trie = new Trie()\ntrie.insert(\"mango\")\ntrie.countWordsEqualTo(\"apple\")      // return 0\ntrie.insert(\"app\")\ntrie.erase(\"app\")\ntrie.countWordsStartingWith(\"mango\") // return 1\n\nConstraints:\n- 1 <= word.length, prefix.length <= 2000\n- word and prefix consist only of lowercase English letters.\n- At most 3*10^4 calls in total will be made to insert, countWordsEqualTo,\n  countWordsStartingWith and erase.", n: "#Brute Force:\n1.\nTC -> O(), SC -> O()\n\n#Better Approach:\n1.\nTC -> O(), SC -> O()\n\n#Optimal Approach:\n1.\nTC -> O(), SC -> O()\n\n#KEY INSIGHT:\n-" },
      { name: "Longest Word with All Prefixes", d: "medium"                                                                                                                  , q: "Longest Word with All Prefixes\nGiven a string array `nums` of length n, a string is called a COMPLETE\nstring if every prefix of this string is also present in the array\nnums. Find the longest complete string in the array nums.\nIf there are multiple strings with the same longest length, return the\nlexicographically smallest one. If no such complete string exists,\nreturn an empty string \"\".\n\nExamples:\nExample 1:\nInput: nums = [\"n\", \"ni\", \"nin\", \"ninj\", \"ninja\", \"nile\"]\nOutput: \"ninja\"\nExplanation: Every prefix of \"ninja\" — \"n\", \"ni\", \"nin\", \"ninj\",\n\"ninja\" — is present in the array.\n\nExample 2:\nInput: nums = [\"a\", \"bb\", \"ab\", \"abc\"]\nOutput: \"\"\nExplanation: \"abc\" needs \"ab\" (yes) and \"a\" (yes) but also needs\nitself — actually it has all its prefixes (\"a\",\"ab\",\"abc\")? \"a\" is in\narray, \"ab\" is in array, \"abc\" is itself; let me recheck — yes \"abc\"\nis complete. Note: this example varies by source; the canonical\nStriver example uses an array where no complete string exists, in\nwhich case \"\" is returned.\n\nConstraints:\n1 <= n <= 10^5\n1 <= nums[i].length <= 50\nnums[i] consists of lowercase English letters.\n\nApproach: Build a Trie of all strings in nums. Then DFS the Trie: a\nstring is a candidate complete string only if every node along its\npath is marked as \"end of a word\" (meaning that prefix exists in nums).\nTrack the longest such complete word; ties broken lexicographically.", n: "#Brute Force:\n1.\nTC -> O(), SC -> O()\n\n#Better Approach:\n1.\nTC -> O(), SC -> O()\n\n#Optimal Approach:\n1.\nTC -> O(), SC -> O()\n\n#KEY INSIGHT:\n-" },
      { name: "Number of distinct substrings in a string", d: "medium"                                                                                                                  , q: "Number of distinct substrings in a string\nImplement a program that takes a string 'S' as input and returns the number of distinct\nsubstrings of the given string, including the empty substring. Use a trie data structure.\n\nExamples:\nInput: s = \"aba\"\nOutput: 6\nExplanation: The distinct substrings are \"a\", \"ab\", \"ba\", \"b\", \"aba\", \"\".\n\nInput: s = \"abc\"\nOutput: 7\nExplanation: The distinct substrings are \"a\", \"ab\", \"abc\", \"b\", \"bc\", \"c\", \"\".", n: "#Brute Force:\n1.\nTC -> O(), SC -> O()\n\n#Better Approach:\n1.\nTC -> O(), SC -> O()\n\n#Optimal Approach:\n1.\nTC -> O(), SC -> O()\n\n#KEY INSIGHT:\n-" },

const PLAN_START = "2026-06-22";  // YYYY-MM-DD (a Monday)

// Day offsets within a week (Mon=0)
const DAY_OFFSET = { Mon: 0, Tue: 1, Wed: 2, Thu: 3, Fri: 4, Sat: 5, Sun: 6 };
const DOW = ["Sun", "Mon", "Tue", "Wed", "Thu", "Fri", "Sat"];

function parseDate(s) {
  const [y, m, d] = s.split("-").map(Number);
  return new Date(y, m - 1, d);
}
function ymd(dt) {
  return dt.getFullYear() + "-" + String(dt.getMonth() + 1).padStart(2, "0") + "-" + String(dt.getDate()).padStart(2, "0");
}
function diffDays(a, b) {
  return Math.floor((a - b) / 86400000);
}
function plannedDate(wk, dy) {
  const start = parseDate(PLAN_START);
  start.setDate(start.getDate() + (wk - 1) * 7 + DAY_OFFSET[dy]);
  return start;
}
function fmtDate(dt) {
  return DOW[dt.getDay()] + ", " + dt.toLocaleString("en-US", { month: "short", day: "numeric" });
}

// Build name -> {si, pi} lookup against DATA
function buildPlanLookup() {
  const lookup = {};
  DATA.forEach((sec, si) => {
    sec.problems.forEach((p, pi) => {
      lookup[p.name] = { si, pi };
    });
  });
  return lookup;
}
const PLAN_LOOKUP = buildPlanLookup();

// Tag every PLAN row: planned ISO date + array of {name, si, pi} resolved entries
const PLAN_ROWS = PLAN.map(row => {
  const dt = plannedDate(row.wk, row.dy);
  return {
    wk: row.wk,
    dy: row.dy,
    iso: ymd(dt),
    dt: dt,
    items: row.ps.map(name => ({
      name,
      loc: PLAN_LOOKUP[name] || null,
    }))
  };
});

// All PLANNED problem names -> the row they came from
const NAME_TO_ROW = {};
PLAN_ROWS.forEach(r => r.items.forEach(it => NAME_TO_ROW[it.name] = r));

function isSolved(loc) {
  if (!loc) return false;
  const key = getKey(loc.si, loc.pi);
  const p = DATA[loc.si].problems[loc.pi];
  return key in state ? !!state[key] : !!p.s;
}

function categorizePlan() {
  const today = new Date();
  today.setHours(0, 0, 0, 0);
  const todayISO = ymd(today);

  const past = [], todays = [], future = [];
  PLAN_ROWS.forEach(row => {
    if (row.iso < todayISO) past.push(row);
    else if (row.iso === todayISO) todays.push(row);
    else future.push(row);
  });

  // Backlog = past planned items not yet solved
  const backlog = past.flatMap(row =>
    row.items.filter(it => !isSolved(it.loc)).map(it => ({ row, item: it }))
  );

  // Today's items
  const todayItems = todays.flatMap(row =>
    row.items.map(it => ({ row, item: it }))
  );

  // Extras: solved problems that are NOT in past/today plan
  //   - solved AND scheduled in future
  //   - solved AND not in PLAN at all
  const extras = [];
  DATA.forEach((sec, si) => {
    sec.problems.forEach((p, pi) => {
      if (!isSolved({si, pi})) return;
      const row = NAME_TO_ROW[p.name];
      if (!row) {
        extras.push({ row: null, item: { name: p.name, loc: {si, pi} } });
      } else if (row.iso > todayISO) {
        extras.push({ row, item: { name: p.name, loc: {si, pi} } });
      }
    });
  });

  // Find next future day with UNSOLVED work for "Upcoming" (skip days already done ahead)
  let upcoming = null;
  for (const row of future) {
    const unsolved = row.items.filter(it => !isSolved(it.loc));
    if (unsolved.length) { upcoming = Object.assign({}, row, { items: unsolved }); break; }
  }
  return { today, todayISO, past, todayRows: todays, future, backlog, todayItems, extras, upcoming };
}

  if (cat.todayRows.length > 0) return "today";
  if (cat.backlog.length > 0) return "backlog";
  if (cat.upcoming) return "upcoming";

}

function renderGroupedByDay(entries) {
  // entries: [{ row, item }, ...]; group by row
  const list = document.getElementById("plan-list");
  list.textContent = "";
  if (!entries.length) {
    const empty = document.createElement("div");
    empty.className = "plan-empty";
    empty.textContent = "Nothing here — you're all caught up.";
    list.appendChild(empty);
    return;
  }
  const groups = new Map();
  entries.forEach(e => {
    const key = e.row ? `${e.row.wk}|${e.row.dy}` : "off-plan";
    if (!groups.has(key)) groups.set(key, { row: e.row, items: [] });
    groups.get(key).items.push(e.item);
  });
  groups.forEach(g => {
    const wrap = document.createElement("div");
    wrap.className = "plan-day-group";
    const label = document.createElement("div");
    label.className = "plan-day-label";
    if (g.row) {
      const pill = document.createElement("span");
      pill.className = "wk-pill";
      pill.textContent = "W" + g.row.wk;
      label.appendChild(pill);
      label.appendChild(document.createTextNode(g.row.dy + " · " + fmtDate(g.row.dt)));
    } else {
      label.textContent = "Off-plan / not in 12-week schedule";
    }
    wrap.appendChild(label);
    g.items.forEach(it => wrap.appendChild(renderPlanItem(it, g.row)));
    list.appendChild(wrap);
  });
}

const fullPlanOpenWeeks = new Set();

function renderFullPlan(cat) {
  const list = document.getElementById("plan-list");
  list.textContent = "";
  // Group PLAN_ROWS by week number
  const byWeek = new Map();
  PLAN_ROWS.forEach(r => {
    if (!byWeek.has(r.wk)) byWeek.set(r.wk, []);
    byWeek.get(r.wk).push(r);
  });
  // Determine current week
  const todayISO = cat.todayISO;
  let curWk = null;
  for (const r of PLAN_ROWS) {
    if (r.iso >= todayISO) { curWk = r.wk; break; }
  }
  // Auto-open current week on first render
  if (curWk && fullPlanOpenWeeks.size === 0) fullPlanOpenWeeks.add(curWk);

  const totalAll = PLAN_ROWS.reduce((n, r) => n + r.items.length, 0);
  const done = PLAN_ROWS.reduce(
    (n, r) => n + r.items.filter(it => isSolved(it.loc)).length, 0
  );
  const summary = document.createElement("div");
  summary.className = "plan-empty";
  summary.style.color = "var(--text-dim)";
  summary.style.marginBottom = "10px";
  summary.textContent = `12-week plan · ${done} / ${totalAll} done`;
  list.appendChild(summary);

  Array.from(byWeek.keys()).sort((a, b) => a - b).forEach(wk => {
    const rows = byWeek.get(wk);
    const wkTotal = rows.reduce((n, r) => n + r.items.length, 0);
    const wkDone = rows.reduce(
      (n, r) => n + r.items.filter(it => isSolved(it.loc)).length, 0
    );
    const isCurrent = wk === curWk;
    const isOpen = fullPlanOpenWeeks.has(wk);

    const weekWrap = document.createElement("div");
    weekWrap.className = "plan-week" + (isCurrent ? " current" : "");

    const header = document.createElement("div");
    header.className = "plan-week-header" + (isOpen ? " open" : "");
    const chevron = document.createElement("span");
    chevron.className = "plan-week-chevron";
    chevron.textContent = "▶";
    const wkLabel = document.createElement("span");
    wkLabel.className = "plan-week-label";
    wkLabel.textContent = `Week ${wk}`;
    if (isCurrent) {
      const tag = document.createElement("span");
      tag.className = "plan-week-tag";
      tag.textContent = "current";
      wkLabel.appendChild(document.createTextNode(" "));
      wkLabel.appendChild(tag);
    }
    const wkStats = document.createElement("span");
    wkStats.className = "plan-week-stats";
    wkStats.textContent = `${wkDone} / ${wkTotal}`;
    header.appendChild(chevron);
    header.appendChild(wkLabel);
    header.appendChild(wkStats);
    header.addEventListener("click", () => {
      if (fullPlanOpenWeeks.has(wk)) fullPlanOpenWeeks.delete(wk);
      else fullPlanOpenWeeks.add(wk);
      renderPlanPanel();
    });
    weekWrap.appendChild(header);

    if (isOpen) {
      const body = document.createElement("div");
      body.className = "plan-week-body";
      rows.forEach(r => {
        const dayGroup = document.createElement("div");
        dayGroup.className = "plan-day-group";
        const dayLabel = document.createElement("div");
        dayLabel.className = "plan-day-label";
        dayLabel.textContent = `${r.dy} · ${fmtDate(r.dt)}`;
        dayGroup.appendChild(dayLabel);
        r.items.forEach(it => dayGroup.appendChild(renderPlanItem(it, r)));
        body.appendChild(dayGroup);
      });
      weekWrap.appendChild(body);
    }
    list.appendChild(weekWrap);
  });
}

    } else {
      const items = cat.upcoming.items.map(it => ({ row: cat.upcoming, item: it }));
      renderGroupedByDay(items);
    }
  } else if (planTab === "full") {
    renderFullPlan(cat);
  } else if (planTab === "extras") {
    renderGroupedByDay(cat.extras);
  }
}
/* PLAN_PANEL_JS_END */







function loadState() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; }
  catch(e) { return {}; }
}

function saveState(st) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(st));
}

function getKey(si, pi) { return si + "-" + pi; }
function getNoteKey(si, pi) { return "n-" + si + "-" + pi; }
function getQuestionKey(si, pi) { return "q-" + si + "-" + pi; }

var state = loadState();
var currentFilter = "all";
var openSections = {};
var openNotes = {};
var openQuestions = {};

function autoResize(el) {
  el.style.height = "auto";
  el.style.height = el.scrollHeight + "px";
}

function buildProblemItem(p, si, pi) {
  var key = getKey(si, pi);
  var noteKey = getNoteKey(si, pi);
  var questionKey = getQuestionKey(si, pi);
  var isChecked = key in state ? !!state[key] : !!p.s;
  var note = state[noteKey] || p.n || "";
  var question = state[questionKey] || p.q || "";

  var wrapper = document.createDocumentFragment();

  var item = document.createElement("div");
  item.className = "problem-item" + (isChecked ? " completed" : "");

  var checkbox = document.createElement("input");
  checkbox.type = "checkbox";
  checkbox.className = "problem-checkbox";
  checkbox.checked = isChecked;
  checkbox.addEventListener("change", function() {
    toggleProblem(si, pi, this.checked);
  });

  var nameSpan = document.createElement("span");
  nameSpan.className = "problem-name";
  nameSpan.textContent = p.name;
  nameSpan.addEventListener("click", function() { checkbox.click(); });

  var diffSpan = document.createElement("span");
  diffSpan.className = "problem-difficulty diff-" + p.d;
  diffSpan.textContent = p.d;

  var questionBtn = document.createElement("button");
  questionBtn.className = "question-btn" + (question ? " has-content" : "");
  questionBtn.textContent = "question";

  var notesBtn = document.createElement("button");
  notesBtn.className = "notes-btn";
  notesBtn.textContent = "notes";

  item.appendChild(checkbox);
  item.appendChild(nameSpan);
  item.appendChild(diffSpan);
  item.appendChild(questionBtn);
  item.appendChild(notesBtn);

  var noteId = si + "-" + pi;

  var questionArea = document.createElement("textarea");
  questionArea.className = "question-area" + (openQuestions[noteId] ? " visible" : "");
  questionArea.placeholder = "Paste the problem statement here...";
  questionArea.value = question;
  questionArea.addEventListener("input", function() { autoResize(this); });
  questionArea.addEventListener("blur", function() {
    var qKey = getQuestionKey(si, pi);
    if (this.value.trim()) {
      state[qKey] = this.value.trim();
    } else {
      delete state[qKey];
    }
    saveState(state);
  });

  questionBtn.addEventListener("click", function() {
    var wasVisible = openQuestions[noteId];
    document.querySelectorAll(".question-area.visible, .notes-area.visible").forEach(function(el) {
      el.classList.remove("visible");
    });
    openNotes = {};
    openQuestions = {};
    if (!wasVisible) {
      questionArea.classList.add("visible");
      openQuestions[noteId] = true;
      autoResize(questionArea);
      questionArea.focus();
    }
  });

  var textarea = document.createElement("textarea");
  textarea.className = "notes-area" + (openNotes[noteId] ? " visible" : "");
  textarea.placeholder = "Add notes...";
  textarea.value = note;
  textarea.addEventListener("input", function() { autoResize(this); });
  textarea.addEventListener("blur", function() {
    saveNote(si, pi, this.value);
  });

  notesBtn.addEventListener("click", function() {
    var wasVisible = openNotes[noteId];
    document.querySelectorAll(".notes-area.visible, .question-area.visible").forEach(function(el) {
      el.classList.remove("visible");
    });
    openNotes = {};
    openQuestions = {};
    if (!wasVisible) {
      textarea.classList.add("visible");
      openNotes[noteId] = true;
      autoResize(textarea);
      textarea.focus();
    }
  });

  wrapper.appendChild(item);
  wrapper.appendChild(questionArea);
  wrapper.appendChild(textarea);
  return wrapper;
}

function render() {
  var container = document.getElementById("sections-container");
  container.textContent = "";

  var totalDone = 0;
  var totalAll = 0;

  DATA.forEach(function(section, si) {
    var sectionDone = 0;
    section.problems.forEach(function(_, pi) {
      var k = getKey(si, pi); if (k in state ? state[k] : section.problems[pi].s) sectionDone++;
    });
    totalDone += sectionDone;
    totalAll += section.problems.length;

    var filteredProblems = [];
    section.problems.forEach(function(p, pi) {
      var dominated = false;
      var fk = getKey(si, pi); var fChecked = fk in state ? !!state[fk] : !!p.s; if (currentFilter === "pending" && fChecked) dominated = true;
      if (currentFilter === "completed" && !fChecked) dominated = true;
      if (currentFilter === "easy" && p.d !== "easy") dominated = true;
      if (currentFilter === "medium" && p.d !== "medium") dominated = true;
      if (currentFilter === "hard" && p.d !== "hard") dominated = true;
      if (!dominated) filteredProblems.push({ p: p, pi: pi });
    });

    if (filteredProblems.length === 0 && currentFilter !== "all") return;

    var pct = section.problems.length > 0 ? (sectionDone / section.problems.length * 100) : 0;
    var isComplete = sectionDone === section.problems.length && section.problems.length > 0;

    var div = document.createElement("div");
    div.className = "section" + (openSections[si] ? " open" : "");

    var header = document.createElement("div");
    header.className = "section-header";
    (function(idx) {
      header.addEventListener("click", function() {
        openSections[idx] = !openSections[idx];
        div.classList.toggle("open");
      });
    })(si);

    var titleDiv = document.createElement("div");
    titleDiv.className = "section-title";

    var chevron = document.createElement("span");
    chevron.className = "chevron";
    chevron.textContent = "▶";

    var h3 = document.createElement("h3");
    h3.textContent = (isComplete ? "✓ " : "") + section.name;

    titleDiv.appendChild(chevron);
    titleDiv.appendChild(h3);

    var metaDiv = document.createElement("div");
    metaDiv.className = "section-meta";

    var countSpan = document.createElement("span");
    countSpan.className = "section-count";
    var doneSpan = document.createElement("span");
    doneSpan.className = "done-count";
    doneSpan.textContent = sectionDone;
    countSpan.appendChild(doneSpan);
    countSpan.appendChild(document.createTextNode(" / " + section.problems.length));

    var barDiv = document.createElement("div");
    barDiv.className = "section-bar";
    var barFill = document.createElement("div");
    barFill.className = "section-bar-fill";
    barFill.style.width = pct + "%";
    barDiv.appendChild(barFill);

    metaDiv.appendChild(countSpan);
    metaDiv.appendChild(barDiv);

    header.appendChild(titleDiv);
    header.appendChild(metaDiv);

    var listDiv = document.createElement("div");
    listDiv.className = "problem-list";

    filteredProblems.forEach(function(item) {
      listDiv.appendChild(buildProblemItem(item.p, si, item.pi));
    });

    div.appendChild(header);
    div.appendChild(listDiv);
    container.appendChild(div);
  });

  var remaining = totalAll - totalDone;

  document.getElementById("stat-total").textContent = totalAll;
  document.getElementById("stat-done").textContent = totalDone;
  document.getElementById("stat-remaining").textContent = remaining;

  var pctAll = totalAll > 0 ? (totalDone / totalAll * 100) : 0;
  document.getElementById("overall-pct").textContent = Math.round(pctAll) + "%";
  document.getElementById("overall-fill").style.width = pctAll + "%";
  renderPlanPanel();
}

var NOTE_TEMPLATE =
  "#Brute Force:\n" +
  "1. \n" +
  "TC -> O(), SC -> O()\n" +
  "\n" +
  "#Better Approach:\n" +
  "1. \n" +
  "TC -> O(), SC -> O()\n" +
  "\n" +
  "#Optimal Approach:\n" +
  "1. \n" +
  "TC -> O(), SC -> O()\n" +
  "\n" +
  "#KEY INSIGHT:\n" +
  "- ";

function toggleProblem(si, pi, checked) {
  var key = getKey(si, pi);
  var noteKey = getNoteKey(si, pi);
  if (checked) {
    state[key] = true;
    if (!state[noteKey]) {
      state[noteKey] = NOTE_TEMPLATE;
    }
  } else {
    delete state[key];
  }
  saveState(state);
  render();
}

function saveNote(si, pi, value) {
  var key = getNoteKey(si, pi);
  if (value.trim()) {
    state[key] = value.trim();
  } else {
    delete state[key];
  }
  saveState(state);
}

document.getElementById("reset-btn").addEventListener("click", function() {
  if (confirm("Reset all progress? Notes will be preserved.")) {
    var preserved = {};
    Object.keys(state).forEach(function(k) {
      if (k.indexOf("n-") === 0 || k.indexOf("q-") === 0) preserved[k] = state[k];
    });
    state = preserved;
    saveState(state);
    openSections = {};
    render();
  }
});

document.querySelectorAll(".filter-btn").forEach(function(btn) {
  btn.addEventListener("click", function() {
    document.querySelectorAll(".filter-btn").forEach(function(b) {
      b.classList.remove("active");
    });
    btn.classList.add("active");
    currentFilter = btn.dataset.filter;
    render();
  });
});

render();
</script>
