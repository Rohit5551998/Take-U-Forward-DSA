      { name: "Find the intersection point of Y LL", d: "medium"                                                                                                                  , q: "Find the intersection point of Y LL\nGiven the heads of two singly linked-lists headA and headB , return the node at which the two lists intersect . If the two linked lists have no intersection at all, return null.\n\nExamples:\nExample 1:\nInput:\nList 1 = [1,3,1,2,4], List 2 = [3,2,4]\nOutput:\n2\nExplanation: Here, both lists intersecting nodes start from node 2.\n\n Example 2:\nInput:\n List1 = [1,2,7], List 2 = [2,8,1]\nOutput:\n Null\nExplanation: Here, both lists do not intersect and thus no intersection node is present.", n: "#Brute Force:\n1. Two lists intersect at a node they physically SHARE (same object, not same value),\n   so after the intersection every node is common. Find the first shared node.\n2. For each node of list A (outer loop), walk the whole of list B (inner loop) and\n   compare by identity (temp1 == temp2 is object identity here). The first A-node that\n   is found somewhere in B is the intersection; break out of both loops.\n3. Every A-node triggers a full B-scan, giving n*m work.\nTC -> O(n*m), SC -> O(1)\n\n#Better Approach:\n1. Avoid rescanning B for every A-node by remembering all of A first.\n2. Put every node of A into a hash set (by identity). Then walk B once; the first B-node\n   already present in the set is the shared node, because from the intersection onward the\n   nodes are the exact same objects.\n3. One pass to fill the set, one pass to probe it -> linear time, at the cost of storing A.\nTC -> O(n + m), SC -> O(n)\n\n#Optimal Variant I — length difference (find_..._optimal_variant_i):\n1. The two lists share a common tail, so their ends align. If one list is longer, its extra\n   front nodes can never be the intersection. Cancel that head start, then walk both together.\n2. Measure both lengths l1, l2 in one pass each.\n3. Advance the pointer on the longer list by |l1 - l2| so both pointers now have the same\n   number of nodes remaining until the (shared) end.\n4. Move both pointers one step at a time; the first position where they are the same object\n   is the intersection. If they both fall off the end (None), there is no intersection.\nTC -> O(n + m), SC -> O(1)\n\n#Optimal Variant II — two-pointer head switch (find_..._optimal_variant_ii):\n1. Same goal without measuring lengths: make both pointers travel the exact same total\n   distance so they line up at the intersection.\n2. Start temp1 at headA, temp2 at headB. Each step advance both; when a pointer hits the end,\n   redirect it to the OTHER list's head instead of None.\n3. After the switch, temp1 covers lenA + lenB and temp2 covers lenB + lenA — equal totals —\n   so they arrive at the first shared node together. If there is no intersection, both become\n   None at the same step and the loop stops, returning None.\nTC -> O(n + m), SC -> O(1)\n\n#KEY INSIGHT:\n- Intersection is about shared NODES (identity), not equal values, and past the meeting point\n  the two lists are literally the same nodes. Every improvement is about erasing the length\n  gap between the lists so two pointers reach that shared tail in lockstep — either by\n  measuring and skipping the difference (Variant I) or by swapping heads so both walk\n  lenA + lenB total (Variant II).", s: true },
      { name: "Detect a loop in LL", d: "medium"                                                                                                                  , q: "Detect a loop in LL\nGiven a Linked List, determine whether the linked list contains a cycle or not.\n\nExamples:\nInput: LL: 1 2 3 4 5\n\nOutput: True\nExplanation: The last node with the value of 5 has its 'next' pointer pointing back to a previous node with the value of 3. This has resulted in a loop, hence we return true.\n\nInput: LL: 1 2 3 4 9 9\n\nOutput: False\nExplanation: In this example, the linked list does not have a loop hence returns false.", n: "#Brute Force:\n1. If the list has a cycle, walking forward will eventually revisit a node it has already\n   seen; if it is acyclic, it just runs off the end into None. So track what we've visited.\n2. Walk from head keeping a hash set of visited nodes (by identity). Before moving on, check\n   if the current node is already in the set — if yes, that revisit proves a loop; break.\n3. Otherwise add it and advance. If we exit because temp became None, we reached the end\n   with no repeat, so there is no loop. (temp != None distinguishes the two exit reasons.)\nTC -> O(n), SC -> O(n)\n\n#Better Approach:\nSKIPPED — no meaningful tier between O(n)-space hashing and the O(1)-space Floyd's cycle\ndetection; the problem goes straight from brute (hashing) to optimal (slow/fast pointers).\n\n#Optimal Approach:\n1. Detect the cycle without extra memory using Floyd's tortoise-and-hare: two pointers moving\n   at different speeds must collide inside a loop but never meet in a straight list.\n2. Start slow and fast at head. Each step move slow by 1 and fast by 2.\n3. If there is a loop, fast keeps lapping the track and the gap to slow shrinks by 1 each\n   step until they land on the SAME node -> return True.\n4. If there is no loop, fast (or fast.next) reaches None and the walk ends -> return False.\n   Fast is what hits the end first, so the loop condition guards fast and fast.next.\nTC -> O(n), SC -> O(1)\n\n#KEY INSIGHT:\n- A cycle is detectable purely from movement: two pointers at speeds 1 and 2 must eventually\n  coincide inside a loop (the faster closes the 1-step gap every tick) but can never meet if\n  the list terminates — trading the hash set's O(n) space for O(1).", s: true },
      { name: "Reverse LL in group of given size K", d: "hard"                                                                                                                  , q: "Reverse LL in group of given size K\nGiven the head of a singly linked list containing integers, reverse the nodes of the list in\ngroups of k and return the head of the modified list. If the number of nodes is not a\nmultiple of k, then the remaining nodes at the end should be kept as is and not reversed.\nDo not change the values of the nodes, only change the links between nodes.\n\nExamples:\nExample 1:\nInput: head -> 1 -> 2 -> 3 -> 4 -> 5, k = 2\nOutput: head -> 2 -> 1 -> 4 -> 3 -> 5\nExplanation: The groups 1 -> 2 and 3 -> 4 were reversed as 2 -> 1 and 4 -> 3.\n\nExample 2:\nInput: head -> 1 -> 2 -> 3 -> 4 -> 5, k = 3\nOutput: head -> 3 -> 2 -> 1 -> 4 -> 5\nExplanation: The groups 1 -> 2 -> 3 were reversed as 3 -> 2 -> 1.\nNote that 4 -> 5 was not reversed.\n\nConstraints:\n1 <= k <= number of nodes in the linked list <= 10^5\n-10^4 <= ListNode.val <= 10^4", n: "#Brute Force:\nSKIPPED — TUF presents a single approach for this problem (in-place group\nreversal); there is no separate brute-force tier.\n\n#Better Approach:\nSKIPPED — likewise no distinct better tier; the in-place pointer-relinking\ngroup reversal is the only approach.\n\n#Optimal Approach:\n1. Reverse each k-sized block in place and stitch the blocks together. No extra\n   list is needed because reversing only rewires next pointers — the only real\n   bookkeeping is remembering where the previous block ended so it can be\n   connected to the current block's new head.\n2. Keep temp at the start of the current block. find_kth_node walks k-1 steps\n   ahead to locate the block's last node (kthNode).\n3. If kthNode is None, fewer than k nodes remain — the leftover tail must stay\n   in original order, so just attach it to the previous block's tail\n   (back.next = temp) and stop. back starts as None, which doubles as the\n   \"no block reversed yet\" signal: if the whole list is shorter than k, there\n   is nothing to reconnect and head is returned untouched.\n4. Otherwise detach the block before reversing: save front = kthNode.next, then\n   cut with kthNode.next = None so reverse_ll only reverses this k-node slice\n   and cannot run past the block boundary.\n5. Reverse the slice with the standard recursive reverse_ll. Afterwards kthNode\n   is the block's new head and temp (the old first node) is its new tail.\n6. Reconnect the block: for the very first block the overall head itself moves\n   (head = newHead); for every later block the previous block's tail back is\n   pointed at kthNode.\n7. Slide forward: the just-reversed block's tail (temp) becomes the new back,\n   and temp = front jumps to the next block's start. Every node is visited\n   twice — once by the k-th-node scan, once by the reversal.\nTC -> O(2n) ~ O(n), SC -> O(k) (recursion stack of reverse_ll, one block deep at a time)\n\n#KEY INSIGHT:\n- Reversing in k-groups is just \"reverse a whole linked list\" applied to a\n  detached slice: cut the block out (kthNode.next = None), reverse it, then\n  re-stitch using two anchors — the previous block's tail (back) and the next\n  block's head (front). The head pointer changes exactly once, at the first block.", s: true },
      { name: "Check if LL is palindrome or not", d: "medium"                                                                                                                  , q: "Check if LL is palindrome or not\nGiven the head of a singly linked list representing a positive integer number. Each node of\nthe linked list represents a digit of the number, with the 1st node containing the leftmost\ndigit of the number and so on. Check whether the linked list values form a palindrome or not.\nReturn true if it forms a palindrome, otherwise, return false.\nA palindrome is a sequence that reads the same forward and backwards.\n\nExamples:\nExample 1:\nInput: head -> 3 -> 7 -> 5 -> 7 -> 3\nOutput: true\nExplanation: 37573 is a palindrome.\n\nExample 2:\nInput: head -> 1 -> 1 -> 2 -> 1\nOutput: false\nExplanation: 1121 is not a palindrome.\n\nConstraints:\n1 <= number of nodes in the Linked List <= 10^5\n0 <= ListNode.val <= 9\nThe number represented does not contain any leading zeroes.", n: "#Brute Force:\n1. A palindrome reads the same backwards, so compare the list with its own\n   reverse. A stack gives the reverse order for free: values pushed while\n   walking forward come back out last-in-first-out, i.e. backwards.\n2. First pass: walk the list and push every node's value onto the stack\n   (LifoQueue).\n3. Second pass: walk the list again and pop one value per node — the pops\n   replay the list in reverse, so node i is compared against node n-1-i.\n4. Any mismatch means it is not a palindrome, return False; if the whole\n   second pass matches, return True.\nTC -> O(2n) ~ O(n), SC -> O(n) (stack holds all n values)\n\n#Better Approach:\n1. Storing all n values is wasteful — a palindrome check only ever compares\n   the first half against the second half, so the stack needs just n/2 values.\n2. Tortoise-and-hare finds the halves in the same pass that fills the stack:\n   while fast can jump two steps, push slow's value and move slow one step.\n   When fast runs off the end, the stack holds exactly the first half and slow\n   sits at the start of the second half.\n3. Odd-length fix-up: if fast stopped ON the last node (fast is not None and\n   fast.next is None), the length is odd — advance slow once to skip the\n   middle node, which has no partner to compare with.\n4. Walk the second half with slow, popping the stack per node: the pops replay\n   the first half backwards, which is exactly what the second half must equal.\n   First mismatch → False, otherwise True.\nTC -> O(n), SC -> O(n/2) (stack holds only the first half)\n\n#Optimal Approach:\n1. Drop the stack entirely: physically reverse the second half in place, then\n   \"compare i with n-1-i\" becomes two plain forward walks side by side.\n2. A dummy node in front of head makes middle-finding uniform: with slow/fast\n   starting at dummy, slow lands on the LAST node of the FIRST half for both\n   odd and even lengths. (For odd lengths the middle node stays with the first\n   half — correct, since it needs no partner.)\n3. Cut the list after slow: save front = slow.next (start of second half),\n   set slow.next = None so the two halves are independent lists.\n4. Reverse the second half (reverse_ll) to get newHead; now the second half's\n   first node lines up with the whole list's first node.\n5. Walk both halves together — temp from newHead, fast from head — comparing\n   values. The reversed second half is never longer than the first, so looping\n   while temp is not None covers every needed pair. Mismatch → ans = False.\n6. Undo the surgery before returning: re-reverse the second half and re-attach\n   it (slow.next = front) so the caller's list is exactly as it was given.\nTC -> O(n) (n/2 to find middle + n/2 reverse + n/2 compare + n/2 restore),\nSC -> O(n/2) recursion stack of reverse_ll (an iterative reversal would make it a true O(1))\n\n#KEY INSIGHT:\n- Reversing the second half in place turns the back-to-front comparison into\n  two synchronized forward walks, eliminating the need for any stack. The\n  dummy-head trick parks slow on the first half's tail for BOTH parities,\n  making the cut, the compare, and the restore all uniform.", s: true },
      { name: "Find the starting point in LL", d: "medium"                                                                                                                  , q: "Find the starting point in LL\nGiven the head of a singly linked list, the task is to find the starting point of a loop in the\nlinked list if it exists. Return the starting node if a loop exists; otherwise, return null.\n\nA loop exists in a linked list if some node in the list can be reached again by continuously\nfollowing the next pointer. Internally, pos denotes the index (0-based) of the node from where\nthe loop starts. Note that pos is not passed as a parameter.\n\nExamples:\nExample 1:\nInput: head -> 1 -> 2 -> 3 -> 4 -> 5, pos = 1\nOutput (value of the returned node is displayed): 2\nExplanation: The tail of the linked list connects to the node at 1st index.\n\nExample 2:\nInput: head -> 1 -> 3 -> 7 -> 4, pos = -1\nOutput (value of the returned node is displayed): null\nExplanation: No loop is present in the linked list.\n\nConstraints:\n0 <= number of nodes in the cycle <= 10^5\n0 <= ListNode.val <= 10^4\npos is -1 or a valid index in the linked list", n: "#Brute Force:\n1. The first node ever REVISITED while walking the list is exactly the cycle\n   start: every node before the loop is passed once, and the walk re-enters\n   the loop precisely at its entry point.\n2. Walk with temp, storing each visited node OBJECT in a hash set — objects,\n   not values, because values can repeat across different nodes.\n3. Before adding, check membership: if temp is already in the set, this is the\n   revisited node → return it as the cycle start.\n4. If temp falls off the end (None), the list has no cycle → return None.\nTC -> O(n) (one walk, O(1) average set ops), SC -> O(n) (set can hold all nodes)\n\n#Better Approach:\nSKIPPED — no distinct middle tier exists. The problem goes straight from the\nO(n)-space hash-set walk to Floyd's O(1)-space two-pointer algorithm; nothing\nsensible sits in between.\n\n#Optimal Approach:\n1. Floyd's cycle detection, phase 1: slow steps one node, fast steps two. If a\n   cycle exists fast can never escape it, and inside the loop fast gains on\n   slow by exactly one node per step — so they MUST meet; with no cycle fast\n   just runs off the end (None).\n2. Both pointers start from a dummy node placed before head. That is the same\n   as running Floyd on a list one node longer, which stays consistent because\n   phase 2 resets to the dummy as well.\n3. Guard first: a None head or single non-looping node can't hold a cycle →\n   return None immediately.\n4. If the loop exited because fast hit the end (slow != fast), no cycle →\n   return None.\n5. Phase 2: reset fast to the dummy start and advance BOTH pointers one step\n   at a time. Why they collide at the loop entry: the distance from the start\n   to the cycle entry equals the distance from the meeting point forward to\n   that same entry (modulo the loop length) — a consequence of fast having\n   walked exactly twice slow's distance when they met.\n6. The node where they meet now is the starting point of the loop → return it.\nTC -> O(n) + O(n) ~ O(n), SC -> O(1) (two pointers, nothing else)\n\n#KEY INSIGHT:\n- Inside the loop the gap between fast and slow shrinks by one each step, so a\n  meeting is guaranteed. And because fast walked exactly 2x slow's distance,\n  head-to-entry distance ≡ meetingPoint-to-entry distance (mod loop length) —\n  so two one-step walkers from (head, meeting point) land together exactly at\n  the cycle entry, with zero extra memory.", s: true },
      { name: "Flattening of LL", d: "hard"                                                                                                                  , q: "Flattening of LL\nGiven a special linked list containing n head nodes where every node in the linked list contains\ntwo pointers:\n  - 'Next' points to the next node in the list\n  - 'Child' pointer to a linked list where the current node is the head\nEach of these child linked lists is in sorted order and connected by a 'child' pointer.\nFlatten this linked list such that all nodes appear in a single sorted layer connected by the\n'child' pointer and return the head of the modified list.\n\nExamples (on TUF+ the input is drawn as a diagram; here each head node's sorted child\nchain is written as a bracketed list, and the top-level nodes are linked left-to-right):\nExample 1:\nInput: [5 -> 7 -> 8 -> 30], [10 -> 20], [19 -> 22 -> 50], [28 -> 35 -> 40 -> 45]\nOutput: 5 -> 7 -> 8 -> 10 -> 19 -> 20 -> 22 -> 28 -> 30 -> 35 -> 40 -> 45 -> 50\nExplanation: All child lists are merged into one sorted list threaded through 'child'.\n\nExample 2:\nInput: [3 -> 8], [7 -> 10 -> 12], [11 -> 12], [4 -> 20 -> 40]\nOutput: 3 -> 4 -> 7 -> 8 -> 10 -> 11 -> 12 -> 12 -> 20 -> 40\nExplanation: The four sorted child lists are merged into a single sorted 'child' chain.\n\nConstraints:\nn == Number of head nodes\n1 <= n <= 100\n1 <= Number of nodes in each child linked list <= 100\n0 <= ListNode.val <= 1000\nAll child linked lists are sorted in non-decreasing order", n: "(N = number of head nodes, M = average nodes per child list)\n\n#Brute Force:\n1. Ignore the two-pointer structure entirely: the flattened result is just\n   every value in the structure, in sorted order — so collect and sort.\n2. Walk the top layer via next; at each head node record its value, then walk\n   straight down its child chain recording every value below it.\n3. Sort the collected array — this single sort is what establishes the global\n   order the row/column structure was hiding.\n4. Rebuild: hang a fresh node per sorted value off a dummy, threading them\n   through child, and return dummy.child.\nTC -> O(N*M) collect + O(N*M log(N*M)) sort + O(N*M) rebuild ~ O(N*M log(N*M)),\nSC -> O(N*M) for the values array plus O(N*M) newly created nodes\n\n#Better Approach:\n1. K-way merge with a min-heap: at any moment only the FRONT node of each\n   vertical list can possibly be the next-smallest overall, so the heap never\n   needs more than N entries — one candidate per row, not every node.\n2. Seed the heap with the N row heads by walking the top layer via next.\n3. Heap entries are (val, i, node) where i is a running push counter: values\n   can tie, but i never does, so tuple comparison always resolves before\n   reaching the non-comparable ListNode (and equal values pop in push order).\n4. Pop the global minimum and stitch it onto the result tail through child.\n   Exactly one new candidate becomes eligible — the popped node's child\n   (saved before clearing) — push it as that row's replacement.\n5. Clear next and child on each popped node as it is attached, so the result\n   is a clean single sorted layer with no stale links.\n6. Repeat until the heap drains: every node enters and leaves the heap exactly\n   once, each time paying only log N.\nTC -> O(N*M*logN) (N*M nodes x one push+pop on a heap of size <= N),\nSC -> O(N) for the heap; nodes are reused, nothing else allocated\n\n#Optimal Approach:\n1. Each child list is ALREADY sorted, so no sorting is ever needed — the whole\n   problem is just \"merge two sorted lists\" applied N-1 times, rewiring child\n   pointers instead of allocating anything.\n2. Recurse to the right first: flattening_of_ll_optimal(head.next) returns\n   everything AFTER the current row already flattened into one sorted\n   child-chain (base case: the last row is a sorted chain by itself).\n3. Sever head.next = None before merging: everything after this row is already\n   folded into the flattened remainder, so that pointer is obsolete — clearing\n   it here guarantees the final list is a true single layer with no stale next\n   links, no matter which merge path adopts the row head.\n4. Merge the current row into that result with merge_ll — the classic\n   two-pointer merge, but threaded through child: repeatedly attach the\n   smaller of the two front nodes to the dummy's tail and advance that list.\n5. When one list runs out, attach the other's remainder in one shot — it is\n   already sorted, no walk needed.\n6. Every recursion level hands a fully-sorted single-layer list back to the\n   level before it, so the final return is the complete flattened list.\nTC -> O(N^2 * M) worst case (the k-th merge re-walks ~k*M nodes: M*(1+2+...+N)),\nSC -> O(N) recursion stack; zero new nodes — merging reuses the existing ones\n\n#KEY INSIGHT:\n- Sorted-ness is compositional: since every child list is already sorted, the\n  problem reduces to repeated \"merge two sorted lists\" (same primitive as\n  mergeTwoSortedLists, just walking child). Folding the rows from the right\n  means each merge is always \"one row into an already-flat sorted list\".", s: true }

      { name: "Rotate a LL", d: "hard"                                                                                                                  , q: "Rotate a LL\nGiven the head of a singly linked list containing integers, shift the elements of the linked\nlist to the right by k places and return the head of the modified list. Do not change the\nvalues of the nodes, only change the links between nodes.\n\nExamples:\nExample 1:\nInput: head -> 1 -> 2 -> 3 -> 4 -> 5, k = 2\nOutput: head -> 4 -> 5 -> 1 -> 2 -> 3\nExplanation: List after 1 shift to right: head -> 5 -> 1 -> 2 -> 3 -> 4.\nList after 2 shifts to right: head -> 4 -> 5 -> 1 -> 2 -> 3.\n\nExample 2:\nInput: head -> 1 -> 2 -> 3 -> 4 -> 5, k = 4\nOutput: head -> 2 -> 3 -> 4 -> 5 -> 1\nExplanation: List after 1 shift to right: head -> 5 -> 1 -> 2 -> 3 -> 4.\nList after 2 shifts to right: head -> 4 -> 5 -> 1 -> 2 -> 3.\nList after 3 shifts to right: head -> 3 -> 4 -> 5 -> 1 -> 2.\nList after 4 shifts to right: head -> 2 -> 3 -> 4 -> 5 -> 1.\n\nConstraints:\n- 0 <= number of nodes in the linked list <= 10^5\n- -10^4 <= ListNode.val <= 10^4\n- 0 <= k <= 5 * 10^5\n- k may have values greater than the number of nodes in the linked list.", n: "#Brute Force:\n1. A rotation by k is just \"move the last node to the front\" repeated k times,\n   so simulate exactly that.\n2. Each round: walk curr to the tail while prev trails one behind — prev must\n   stop at the second-last node because a singly linked list has no backward\n   pointer to find the new tail otherwise.\n3. Detach the tail (prev.next = None), point it at the old head\n   (curr.next = head), and crown it the new head.\n4. Repeat k times; guard clauses skip the work when k == 0 or the list has\n   fewer than 2 nodes (rotation changes nothing).\nTC -> O(n*k) (each of the k rounds re-walks the whole list to find the tail),\nSC -> O(1)\n\n#Better Approach:\nSKIPPED — no distinct middle tier exists. The problem goes straight from the\nO(n*k) move-tail-to-front simulation to the O(n) close-the-ring optimal;\nnothing sensible sits in between.\n\n#Optimal Approach:\n1. Key realisation: rotating right by k only changes WHERE the list starts —\n   the circular order of nodes is untouched. So make the order literally\n   circular, then choose the new start.\n2. One pass: count the length n while walking to the tail, then close the ring\n   with tail.next = head.\n3. Normalise k %= n — rotating n times is a no-op, so only the remainder\n   matters (this is what makes huge k, e.g. 10^9, free).\n4. The new head is the node at index n-k of the original list, so the new TAIL\n   is at index n-k-1: walk temp n-k-1 steps from head.\n5. Cut the ring there: head = temp.next, then temp.next = None. The list is\n   singly linked again, now starting k places rotated.\nTC -> O(n) + O(n-k) ~ O(n) (one pass to measure+ring, partial pass to the cut point),\nSC -> O(1) (three scalars/pointers, nothing allocated)\n\n#KEY INSIGHT:\n- Rotation never changes the cyclic order of nodes — only the break point.\n  Joining tail to head makes the list a ring where \"rotate by k\" reduces to\n  \"cut the ring after n-k-1 steps\", and k %= n collapses any huge k to at most\n  one extra partial walk.", s: true },
      { name: "Clone a LL with random and next pointer", d: "hard"                                                                                                                  , q: "Clone a LL with random and next pointer\nGiven the head of a special linked list of n nodes where each node contains an additional\npointer called 'random' which can point to any node in the list or null.\nConstruct a deep copy of the linked list where:\n- n new nodes are created with corresponding values as the original linked list.\n- The random pointers point to the corresponding new nodes as per their arrangement in the\n  original list.\n- Return the head of the newly constructed linked list.\nNote: For custom input, an n x 2 matrix is taken with each row having 2 values\n[val, random_index] where:\n- val: an integer representing ListNode.val\n- random_index: index of the node (0 to n-1) that the random pointer points to, otherwise -1.\n\nExamples:\nExample 1:\nInput: [[1, -1], [2, 0], [3, 4], [4, 1], [5, 2]]\nOutput: 1 2 3 4 5, true\nExplanation: All the nodes in the new list have same corresponding values as original nodes.\nAll the random pointers point to their corresponding nodes in the new list.\n'true' represents that the nodes and references were created new.\n\nExample 2:\nInput: [[5, -1], [3, -1], [2, 1], [1, 1]]\nOutput: 5 3 2 1, true\nExplanation: All the nodes in the new list have same corresponding values as original nodes.\nAll the random pointers point to their corresponding nodes in the new list.\n'true' represents that the nodes and references were created new.\n[[5, -1], [3, -1], [2, -1], [1, -1]] will be incorrect, although it has the same values.\n\nConstraints:\n- n == number of nodes in the linked list.\n- 1 <= n <= 10^5\n- -10^4 <= ListNode.val <= 10^4\n- 0 <= random_index < n or random_index == -1.", n: "#Brute Force:\n1. The hard part of cloning is the random pointer: original.random points to\n   some original node, but the copy must point to the CORRESPONDING copy. Solve\n   that lookup with a hash map from original node -> its copy.\n2. First pass: walk the list, create a bare copy (value only) for each original\n   node, and record hashMap[original] = copy. No links wired yet — the copies\n   of later nodes may not exist when an earlier random needs them.\n3. Second pass: for each original, use the map to translate its next and random\n   into the clone world — copy.next = hashMap[original.next] and\n   copy.random = hashMap[original.random]. Because every copy already exists,\n   both lookups always resolve.\n4. Return hashMap[head] as the cloned head.\nTC -> O(2n) ~ O(n) (two passes, O(1) average map ops),\nSC -> O(n) for the hash map of n original->copy entries\n\n#Better Approach:\nSKIPPED — no distinct middle tier exists. The problem goes straight from the\nO(n)-space hash-map clone to the O(1)-space interleaving trick; nothing\nsensible sits in between.\n\n#Optimal Approach:\n1. Kill the hash map by encoding the original->copy mapping INTO the list\n   itself: weave each copy in right after its original, so original.next is\n   always its own copy.\n2. Pass 1 (insert): for each original node, make a copy, splice it between the\n   node and its successor (copy.next = temp.next; temp.next = copy), then jump\n   two steps to the next original.\n3. Pass 2 (wire randoms): now for any original temp, temp.next is its copy and\n   temp.random.next is the copy of temp.random — exactly the node the clone's\n   random must point to. So copy.random = temp.random.next (guarding None).\n   This is the whole payoff of interleaving: the mapping lookup is now a single\n   .next hop instead of a hash lookup.\n4. Pass 3 (detach): un-weave the two lists. For each original, re-link\n   temp.next to the following ORIGINAL (front = temp.next.next) and link the\n   copy to the following COPY (copy.next = front.next). This both extracts the\n   clone AND restores the original list to its input state.\n5. Return the head of the extracted copy list.\nTC -> O(3n) ~ O(n) (three linear passes), SC -> O(1) (only the copies\nthemselves are allocated; no auxiliary map)\n\n#KEY INSIGHT:\n- Interleaving each copy directly after its original turns the random-pointer\n  translation into pure pointer arithmetic: the copy of X is always X.next, so\n  the copy of X.random is always X.random.next — no hash map needed. The final\n  un-weaving pass must restore the original list, not just extract the clone.", s: true },
      { name: "3 Sum", d: "medium"                                                                                                                  , q: "3 Sum\nGiven an integer array nums. Return all triplets such that:\n- i != j, i != k, and j != k\n- nums[i] + nums[j] + nums[k] == 0.\nNotice that the solution set must not contain duplicate triplets. One element can be a part of\nmultiple triplets. The output and the triplets can be returned in any order.\n\nExamples:\nExample 1:\nInput: nums = [2, -2, 0, 3, -3, 5]\nOutput: [[-2, 0, 2], [-3, -2, 5], [-3, 0, 3]]\nExplanation:\nnums[1] + nums[2] + nums[0] = 0\nnums[4] + nums[1] + nums[5] = 0\nnums[4] + nums[2] + nums[3] = 0\n\nExample 2:\nInput: nums = [2, -1, -1, 3, -1]\nOutput: [[-1, -1, 2]]\nExplanation:\nnums[1] + nums[2] + nums[0] = 0\nNote that we have used two -1s as they are separate elements with different indexes.\nBut we have not used the -1 at index 4 as that would create a duplicate triplet.\n\nConstraints:\n- 1 <= nums.length <= 3000\n- -10^4 <= nums[i] <= 10^4", n: "#Brute Force:\n1. We need every triplet (a,b,c) of distinct indices summing to target, so just\n   enumerate all of them with three nested loops i<j<k.\n2. The ordering i<j<k picks each combination of POSITIONS once, but duplicate\n   VALUES can still produce the same triplet, so we must dedup by value.\n3. When the three values add to target, sort them and store the tuple in a set —\n   sorting canonicalises the triplet so reorderings collapse into one entry.\n4. Convert the set of tuples back to a list of lists at the end.\nTC -> O(n^3), SC -> O(no. of triplets) for the answer set\n\n#Better Approach:\n1. Drop the innermost loop with the 2Sum-with-hashing idea: fix the first element i,\n   then the other two must sum to target - nums[i].\n2. Sweep j from i+1, keeping a hashSet of values seen so far in that sweep. For the\n   running pair, the value still needed is target - nums[i] - nums[j]; if it's already\n   in hashSet, a valid triplet exists.\n3. Store that triplet sorted in a set to dedup by value (same reason as brute).\n4. Add nums[j] to hashSet AFTER checking, so we only pair with EARLIER j's and never\n   reuse an index. One outer loop x O(n) inner sweep = O(n^2); hashSet costs O(n) space.\nTC -> O(n^2), SC -> O(n) for the per-sweep hashSet (+ answer)\n\n#Optimal Approach:\n1. Sort the array first so duplicates sit together and a two-pointer scan works.\n2. Fix i (outer). The remaining two values must sum to target - nums[i], findable in\n   O(n) by two pointers on the sorted range to the right of i.\n3. Set j = i+1 and k = last index. Compute the 3-sum: if it's < target the smallest\n   member is too small so move j right; if > target move k left; if equal, record it.\n4. After recording, advance BOTH pointers and skip equal neighbours\n   (nums[j]==nums[j-1], nums[k]==nums[k+1]) so the same value-pair isn't re-added.\n5. Skip duplicate i (nums[i]==nums[i-1]) so each distinct first value is processed\n   once — this dedup-by-adjacency is what removes the need for extra hashing.\n6. One outer loop O(n) x two-pointer O(n) = O(n^2), with no auxiliary hash set.\nTC -> O(n^2), SC -> O(1) extra (ignoring the sort and the output)\n\n#KEY INSIGHT:\n- Sorting turns 3Sum into \"fix one, two-pointer the rest\": the sorted order lets the\n  two pointers converge in O(n) AND lets duplicates be skipped by comparing adjacent\n  values — eliminating the better approach's hash set, so the same O(n^2) time now\n  uses only O(1) extra space.", s: true },
      { name: "Trapping Rainwater", d: "hard"                                                                                                                  , q: "Trapping Rainwater\nGiven an array height of n non-negative integers representing an elevation map, where the\nwidth of each bar is 1, compute how much water can be trapped between the bars after raining.\n\nExamples:\nExample 1:\nInput: height = [0, 1, 0, 2, 1, 0, 1, 3, 2, 1, 2, 1]\nOutput: 6\nExplanation: The elevation map traps water in the dips between the taller bars: 1 unit above\nindex 2 (between walls of height 1 and 2), 4 units above indices 4-6 (between walls of\nheight 2 and 3), and 1 unit above index 9 (between walls of height 2 and 2) — 6 units total.\n\nExample 2:\nInput: height = [4, 2, 0, 3, 2, 5]\nOutput: 9\nExplanation: Water above each index i is min(max height to its left, max height to its right)\nminus height[i]: index 1 holds 2, index 2 holds 4, index 3 holds 1, index 4 holds 2,\nfor a total of 2 + 4 + 1 + 2 = 9 units.\n\nConstraints:\n- n == height.length\n- 1 <= n <= 2 * 10^4\n- 0 <= height[i] <= 10^5", n: "#Brute Force:\n1. Water above a bar i is min(tallest wall to its left, tallest wall to its right) - height[i],\n   and only when that is positive (a bar taller than one of its walls holds nothing). Compute\n   those two walls directly for every index.\n2. Sweep i left to right carrying maxLeft = tallest bar strictly left of i (height[0..i-1]).\n   Update it incrementally each step: maxLeft = max(maxLeft, height[i-1]). For i = 0 it stays 0.\n3. For maxRight, rescan the suffix strictly right of i every iteration: max(height[i+1:]).\n   This inner O(n) rescan per index is what makes the whole thing O(n^2). For the last index\n   it stays 0.\n4. Guard with `height[i] < maxLeft and height[i] < maxRight` before adding min(maxLeft, maxRight)\n   - height[i]. This both skips the taller-than-a-wall case and the boundary bars (where a wall\n   is 0), so no negative water is ever added.\nTC -> O(n^2), SC -> O(1)\n\n#Better Approach:\n1. Water trapped above any index i is decided by the shortest of the two tallest\n   walls around it: min(tallest wall to the left, tallest wall to the right) - height[i].\n   The brute force recomputes those two maxes by scanning outward for every i (O(n^2));\n   here we precompute them once so each lookup is O(1).\n2. Build prefixMax[i] = tallest bar in height[0..i]. Walk left to right carrying the\n   running max: prefixMax[i] = max(prefixMax[i-1], height[i]). This is the tallest wall\n   on the left of (and including) i.\n3. Build suffixMax[i] = tallest bar in height[i..n-1] the same way but walking right to\n   left: suffixMax[i] = max(suffixMax[i+1], height[i]). This is the tallest wall on the right.\n4. For each i, the water it holds is min(prefixMax[i], suffixMax[i]) - height[i]. We only\n   add it when height[i] is strictly below BOTH maxes (otherwise the bar itself is a wall\n   and traps nothing), then sum these contributions.\n5. Two precompute passes + one summing pass, all O(n); the two extra arrays cost O(n) space.\nTC -> O(n), SC -> O(n)\n\n#Optimal Approach:\n1. Same core idea (water at i = min(leftMax, rightMax) - height[i]), but we avoid the two\n   arrays by realizing we only ever need min(leftMax, rightMax). Whichever side is currently\n   shorter is the true bottleneck, so we can commit to that side's answer immediately.\n2. Put pointers left=0, right=n-1 and running leftMax=rightMax=0. Move the pointer that\n   sits on the shorter (or equal) bar inward, since that shorter bar is what limits the water.\n3. If height[left] <= height[right]: the left bar is the bottleneck side. If height[left]\n   is below leftMax, the gap leftMax - height[left] is trapped water (a taller wall on the\n   right is guaranteed to exist, so leftMax alone bounds it); otherwise height[left] becomes\n   the new leftMax. Then advance left.\n4. Else the right side is the bottleneck: mirror the logic with rightMax and step right inward.\n5. Continue until the pointers meet. Each bar is visited once and no auxiliary arrays are\n   needed, so we drop the space to O(1) while keeping O(n) time.\nTC -> O(n), SC -> O(1)\n\n#KEY INSIGHT:\n- Water above a bar depends only on min(tallest-left, tallest-right). Because the shorter\n  of the two boundaries is what actually caps the water, the two-pointer method can always\n  process the side with the smaller wall right away — its answer can't change later — which\n  removes the need to store the full prefix/suffix max arrays.", s: true },
      { name: "Remove duplicates from sorted array", d: "easy"                                                                                                                  , q: "Remove duplicates from sorted array\nGiven an integer array sorted in non-decreasing order, remove the\nduplicates in place such that each unique element appears only once.\nThe relative order of the elements should be kept the same. Since it\nis impossible to change the length of the array in some languages,\nyou must instead have the result placed in the first part of the array\nnums. After deletion, return the number of unique elements in nums.\n\nExamples:\nExample 1:\nInput: nums = [1, 1, 2]\nOutput: 2, nums = [1, 2, _]\nExplanation: Function returns 2 with the first two elements being 1 and 2.\n\nExample 2:\nInput: nums = [0, 0, 1, 1, 1, 2, 2, 3, 3, 4]\nOutput: 5, nums = [0, 1, 2, 3, 4, _, _, _, _, _]\n\nConstraints:\n1 <= nums.length <= 3 * 10^4\n-100 <= nums[i] <= 100\nnums is sorted in non-decreasing order.\n\nExamples:\nInput: arr[]=[1,1,2,2,2,3,3]\nOutput: [1,2,3,_,_,_,_]\nExplanation: Total number of unique elements are 3, i.e[1,2,3] and Therefore return 3 after assigning [1,2,3] in the beginning of the array.\n\nInput: arr[]=[1,1,1,2,2,3,3,3,3,4,4]\nOutput: [1,2,3,4,_,_,_,_,_,_,_]\nExplanation: Total number of unique elements are 4, i.e[1,2,3,4] and Therefore return 4 after assigning [1,2,3,4] in the beginning of the array.", n: "#Brute Force:\n1. We need each distinct value once, kept in order, packed at the front. The simplest way is\n   to remember which values we've already emitted using a hash set.\n2. Scan left to right. For each nums[i] not yet in the set, it is a first occurrence: add it\n   to the set, write it at nums[index], and advance index (the write cursor for uniques).\n3. Duplicates are already in the set, so they are skipped and never written. The count of\n   unique elements is just the set's size.\n4. Works but ignores the fact that the array is sorted, and pays O(n) extra memory for the set.\nTC -> O(n), SC -> O(n)\n\n#Better Approach:\nSKIPPED — for a SORTED array there is no useful middle tier; the set-based brute drops straight\nto the O(1)-space two-pointer optimal that exploits the sortedness.\n\n#Optimal Approach:\n1. Because the array is sorted, all copies of a value are adjacent, so a new unique value is\n   simply one that differs from the last unique we kept — no hash set needed.\n2. Keep a slow pointer i at the last written unique (starts at 0, since nums[0] is always the\n   first unique) and scan a fast pointer j from 1.\n3. When nums[j] != nums[i], j has reached a new distinct value: advance i and copy nums[j] into\n   nums[i], growing the unique prefix by one. When they are equal, j is a duplicate and is skipped.\n4. After the scan, nums[0..i] holds the uniques in order; return i + 1 as the count.\nTC -> O(n), SC -> O(1)\n\n#KEY INSIGHT:\n- Sortedness makes duplicates adjacent, so \"is this value new?\" collapses to a single\n  comparison against the previous kept element — replacing the brute's hash set with two\n  pointers and O(1) space.", s: true },
      { name: "Maximum Consecutive Ones", d: "easy"                                                                                                                  , q: "Maximum Consecutive Ones\nGiven a binary array nums, return the maximum number of consecutive 1s in the array.\nA binary array is an array that contains only 0s and 1s.\n\nExamples:\nExample 1:\nInput: nums = [1, 1, 0, 0, 1, 1, 1, 0]\nOutput: 3\nExplanation: The maximum consecutive 1s are present from index 4 to index 6, amounting to 3 1s.\n\nExample 2:\nInput: nums = [0, 0, 0, 0, 0, 0, 0, 0]\nOutput: 0\nExplanation: No 1s are present in nums, thus we return 0.\n\nConstraints:\n- 1 <= nums.length <= 10^5\n- nums[i] is either 0 or 1.", n: "#Brute Force:\nSKIPPED — a single linear scan is already the natural approach; there is no slower \"brute\"\nworth writing (re-scanning to measure each run would just be a worse O(n^2) version of the same).\n\n#Better Approach:\nSKIPPED — nothing sits between the trivial scan and the optimal; they are the same O(n)/O(1) idea.\n\n#Optimal Approach:\n1. The answer is the longest unbroken run of 1s. Any 0 ends the current run, so we only need\n   to track the length of the current run and the best run seen so far in one pass.\n2. Walk the array keeping cnt = length of the current streak of 1s. On a 1, extend the streak\n   (cnt += 1); on a 0, the streak is broken so reset cnt = 0.\n3. After each element, update maxi = max(maxi, cnt) so the best streak is captured even when the\n   array ends while still inside a run of 1s.\n4. Return maxi. One pass, no extra storage.\nTC -> O(n), SC -> O(1)\n\n#KEY INSIGHT:\n- The longest run of 1s only ever needs the current streak length and the max so far — a 0\n  resets the streak — so a single O(1)-space pass suffices; there is nothing to optimize past it.", s: true }

      { name: "N meetings in one room", d: "medium"                                                                                                                  , q: "N meetings in one room\nThere is one meeting room in a firm. You are given two arrays `start`\nand `end`, each of size N. For index i, start[i] denotes the starting\ntime of the i-th meeting while end[i] denotes its ending time.\nA meeting can be scheduled if the room is free at its starting time\n(i.e., no other meeting is currently being held). Two meetings cannot\noverlap — but a meeting starting at the exact end time of another is\nallowed.\nFind the maximum number of meetings that can be held in the room (and\noptionally, the indices of those meetings).\nGreedy approach: sort meetings by END time ascending; pick a meeting\nwhenever its start time >= the last selected meeting's end time.\n\nExamples:\nInput: N = 6, start[] = {1,3,0,5,8,5}, end[] = {2,4,5,7,9,9}\nOutput: [1, 2, 4, 5]\nExplanation: These meeting can be conducted in the room.\n\nInput: N = 2, start[] = {1,5}, end[] = {7,8}\nOutput: [1]\nExplanation: Any one out of the two meeting can take place.", n: "#Brute Force:\nSKIPPED — N meetings is a canonical greedy problem; sort-by-end-time selection\nis the only standard approach. The sole alternative is exponential subset\nenumeration (try every subset, keep the largest non-overlapping one), which is\nnot a distinct technique worth a tier.\n\n#Better Approach:\nSKIPPED — no intermediate tier exists between the (exponential) brute and the\nO(n log n) greedy; the greedy is the single meaningful approach.\n\n#Optimal Approach:\n1. Classic activity-selection greedy: to fit the MOST meetings, keep the room\n   free as early as possible — so the meeting that ENDS earliest is never a\n   worse pick than one ending later.\n2. Pack each meeting as a tuple (start, end, original_index + 1) so the 1-based\n   index survives the sort (the answer needs indices, not times).\n3. Sort all meetings by end time ascending. Python's sort is stable, so equal\n   end times keep their input order.\n4. Track lastEnd (end time of the last selected meeting), initialised to -1 so\n   the first meeting is always takeable.\n5. Scan in sorted order; take a meeting only if its start is >= lastEnd (the\n   room is free — a meeting may begin exactly when the previous one ends), then\n   advance lastEnd to this meeting's end and record its index.\n6. The collected indices are a maximal set of non-overlapping meetings.\nTC -> O(n log n) (dominated by the sort; the scan is O(n)),\nSC -> O(n) (the tuple list plus the result)\n\n#KEY INSIGHT:\n- Greedily choosing the earliest-finishing compatible meeting is provably\n  optimal: finishing sooner frees the room sooner, which can only allow more\n  (never fewer) later meetings. Sorting by end time turns this into a single\n  left-to-right pass.", s: true },
      { name: "Minimum number of platforms required for a railway", d: "medium"                                                                                                                  , q: "Minimum number of platforms required for a railway\nWe are given two arrays `arr` and `dep` of size N, representing the\narrival and departure times of N trains that stop at a railway\nstation. Find the minimum number of platforms needed so that no train\nhas to wait.\nNote: If a train arrives at exactly the same time another train\ndeparts, they cannot share a platform (they need separate platforms).\nGreedy approach:\n  1. Sort both arrival and departure arrays independently.\n  2. Use two pointers; iterate through merged events. When you see an\n     arrival before the next departure, you need an extra platform; on\n     a departure before the next arrival, you free one.\n  3. Track the running max of simultaneous trains — that's the answer.\n\nExamples:\nInput: N=6,\narr[] = {9:00, 9:45, 9:55, 11:00, 15:00, 18:00}\ndep[] = {9:20, 12:00, 11:30, 11:50, 19:00, 20:00}\nOutput: 3\nExplanation: There are at most three trains at a time. The train at 11:00 arrived but\nthe trains which had arrived at 9:45 and 9:55 have still not departed. So we need at\nleast three platforms here.\n\nInput : N=2,\narr[]={10:20,12:00}\ndep[]={10:50,12:30}\nOutput: 1\nExplanation: Before the arrival of the new train, the earlier train already departed.\nSo we don't require multiple platforms.", n: "#Brute Force:\n1. The answer is the peak number of trains present at the same instant — each\n   simultaneously-present train needs its own platform. Count, for every train,\n   how many trains overlap it, and take the maximum.\n2. For train i, start cnt = 1 (itself), then compare it against every later\n   train j.\n3. Two trains overlap iff one's arrival falls within the other's [arr, dep]\n   span: (arr[i] <= arr[j] <= dep[i]) or (arr[j] <= arr[i] <= dep[j]). Bump cnt\n   on each overlap.\n4. Any peak-concurrency group all pairwise-overlap, and its lowest-index train\n   (as i) sees all the others as later j — so maxCnt over all i is the answer.\nTC -> O(n^2) (every pair checked), SC -> O(1)\n\n#Better Approach:\n1. Model the timeline as events: each arrival is an (\"A\") marker, each\n   departure a (\"D\") marker, tagged with its time; sort all 2n events by time.\n2. Sweep with a running cnt of occupied platforms and two pointers — i over\n   arrival events, j over departure events — starting j at the first departure.\n3. If the next arrival is <= the next departure, a train needs a platform\n   (cnt += 1, advance i to the next \"A\"); else a train has left\n   (cnt -= 1, advance j to the next \"D\").\n4. maxCnt records the peak occupancy across the sweep.\nTC -> O(n log n) (sorting 2n events), SC -> O(n) (the events list)\n\n#Optimal Approach:\n1. Same peak-occupancy idea, but drop the train identities: sort arrivals and\n   departures INDEPENDENTLY into two ordered streams of instants.\n2. Two pointers — i over sorted arrivals, j over sorted departures — with cnt =\n   platforms currently in use.\n3. If arr[i] <= dep[j], the next arrival happens before (or exactly when) the\n   earliest-departing train leaves, so it needs a fresh platform: cnt += 1,\n   i += 1. The <= is deliberate — a train arriving exactly as another departs\n   still can't share (per the problem), so it counts as an overlap.\n4. Otherwise the earliest departure comes first and frees a platform:\n   cnt -= 1, j += 1.\n5. maxCnt tracks the running peak = the minimum platforms needed.\nTC -> O(n log n) (the two sorts; the sweep is O(n)), SC -> O(1) beyond sorting\n\n#KEY INSIGHT:\n- The answer is just the maximum number of trains present at any single instant.\n  Sorting arrivals and departures separately lets a two-pointer sweep replay the\n  events in time order and track that peak in O(n) — the trains never need to\n  stay paired. Using <= (arrival == departure overlaps) enforces that a train\n  arriving exactly when another leaves still needs its own platform.", s: true },
      { name: "Job sequencing Problem", d: "medium"                                                                                                                  , q: "Job sequencing Problem\nGiven a 2D array Jobs of size Nx3, where Jobs[i][0] represents JobID, Jobs[i][1] represents\nDeadline, and Jobs[i][2] represents the Profit associated with that job. Each job takes\n1 unit of time to complete and only one job can be scheduled at a time.\nThe profit associated with a job is earned only if it is completed by its deadline.\nFind the number of jobs done and the maximum profit.\n\nExamples:\nExample 1:\nInput: Jobs = [ [1, 4, 20], [2, 1, 10], [3, 1, 40], [4, 1, 30] ]\nOutput: 2 60\nExplanation: Job with JobID 3 can be performed at time t=1 giving a profit of 40.\nJob with JobID 1 can be performed at time t=2 giving a profit of 20.\nNo more jobs can be scheduled, so total profit = 40 + 20 => 60.\nTotal number of jobs completed is two (JobID 1, JobID 3). So the answer is 2 60.\n\nExample 2:\nInput: Jobs = [ [1, 2, 100], [2, 1, 19], [3, 2, 27], [4, 1, 25], [5, 1, 15] ]\nOutput: 2 127\nExplanation: Job with JobID 1 can be performed at time t=1 giving a profit of 100.\nJob with JobID 3 can be performed at time t=2 giving a profit of 27.\nNo more jobs can be scheduled, so total profit = 100 + 27 => 127.\nTotal number of jobs completed is two (JobID 1, JobID 3). So the answer is 2 127.\n\nConstraints:\n1 <= N <= 10^4\n1 <= Deadline <= N\n1 <= Profit <= 500", n: "#Brute Force:\nSKIPPED — the only brute is generating all 2^N subsets of jobs and keeping the\nbest feasible one, an exponential O(2^N) approach, not a normal-complexity tier\nworth implementing.\n\n#Better Approach:\nSKIPPED — no distinct tier exists between the exponential brute and the greedy\noptimal; the sort-by-profit + slot-array greedy is the single polynomial approach.\n\n#Optimal Approach:\n1. Greedy: a job only earns if done by its deadline, and each slot holds one\n   job — so to maximise profit, consider jobs in DESCENDING profit order and\n   give each the LATEST free slot on or before its deadline.\n2. Sort jobs by profit descending, so the most valuable jobs claim slots first.\n3. Find maxDeadline and make a slot array hashArray[1..maxDeadline], all -1\n   (free); index t represents the time unit t.\n4. For each job (richest first), scan slots from its deadline down to 1 and take\n   the first free one: mark it with the job id, add the profit, bump the count,\n   and stop.\n5. Choosing the LATEST free slot (not the earliest) is the crux — it leaves the\n   lower-numbered slots open for later jobs that have tighter deadlines and so\n   can only sit early.\nTC -> O(n log n + n*maxDeadline) (sort + per-job slot scan),\nSC -> O(maxDeadline) for the slot array\n\n#KEY INSIGHT:\n- Process jobs by decreasing profit and place each in the latest still-free slot\n  before its deadline. \"Latest slot\" is what makes it optimal: it greedily\n  protects earlier time units for the tighter-deadline jobs still to be placed,\n  so no high-profit job is ever needlessly displaced.", s: true },
      { name: "Fractional Knapsack", d: "medium"                                                                                                                  , q: "Fractional Knapsack\nYou are given N items, each with a value val[i] and a weight wt[i], and a knapsack with a\ntotal weight capacity W. Fill the knapsack so that the total value of the items placed in it\nis maximized, and return that maximum total value.\nUnlike 0/1 Knapsack, you are allowed to break an item: you may take any fraction of an item,\nand the value obtained is proportional to the fraction of its weight taken. Each item can be\ntaken at most once (fully or partially).\n\nExamples:\nExample 1:\nInput: N = 3, W = 50, val = [60, 100, 120], wt = [10, 20, 30]\nOutput: 240.0\nExplanation: Take item 1 fully (wt 10, val 60) and item 2 fully (wt 20, val 100). Capacity\nleft = 50 - 30 = 20, so take 20/30 of item 3, worth 120 * 20/30 = 80.\nTotal value = 60 + 100 + 80 = 240.0.\n\nExample 2:\nInput: N = 2, W = 25, val = [60, 100], wt = [10, 20]\nOutput: 135.0\nExplanation: Value/weight ratios are 6.0 and 5.0. Take item 1 fully (wt 10, val 60). Capacity\nleft = 25 - 10 = 15, so take 15/20 of item 2, worth 100 * 15/20 = 75.\nTotal value = 60 + 75 = 135.0.", n: "#Brute Force:\nSKIPPED — there is no meaningful brute-force tier here. Because items can be\nsplit, greedily taking the best value/weight ratio is provably optimal, so\nthere is no naive \"try all subsets\" step to improve on (that is the 0/1\nknapsack, a different problem). We go straight to the greedy solution.\n\n#Better Approach:\nSKIPPED — same reason: the greedy-by-ratio approach is already optimal, with no\ndistinct intermediate tier between it and a (non-existent) brute force.\n\n#Optimal Approach:\n1. Intuition: since we can take fractions, every unit of capacity should be\n   spent on the item that gives the most value per unit weight. So rank items\n   by their value/weight ratio and consume them from richest ratio to poorest.\n2. Build `items` = zip(val, wt) sorted by `val/wt` descending. Now the front of\n   the list is the most \"value-dense\" item.\n3. Walk the sorted items, carrying a running `total` value and shrinking\n   `capacity` as we consume weight.\n4. If the whole current item fits (`wt <= capacity`), take it fully: add its\n   entire value to `total` and subtract its weight from `capacity`. Full items\n   are free wins — we never regret taking a denser item completely.\n5. Otherwise the item cannot fit whole, so take the fraction that fills the\n   remaining capacity: add `(val/wt) * capacity` (value of exactly `capacity`\n   worth of weight) and `break` — the knapsack is now full, and every later\n   item has a worse ratio so there is nothing better to swap in.\n6. Return `total`. Example: val=[60,100,120], wt=[10,20,30], cap=50 → ratios\n   6,5,4; take item0 full (+60, cap40), item1 full (+100, cap20), then 20/30 of\n   item2 (+80) → 240.0.\nTC -> O(N log N) — the sort dominates; the single sweep is O(N).\nSC -> O(N) for the sorted list of (val, wt) pairs.\n\n#KEY INSIGHT:\n- Fractional-ability is what makes greedy exact: because any item can be split,\n  filling capacity with the highest value/weight ratio first is always optimal\n  — there is never a reason to skip a denser item for a less dense one. (This is\n  exactly why the same greedy fails for 0/1 knapsack, where you can't split.)", s: true },
      { name: "Minimum coins", d: "hard"                                                                                                                  , q: "Minimum coins\nGiven an integer array `coins` representing coins of different\ndenominations and an integer `amount` representing a total amount of\nmoney, return the fewest number of coins that you need to make up that\namount. If that amount of money cannot be made up by any combination of\nthe coins, return -1.\nYou have an infinite number of each kind of coin.\nNote: The Striver sheet groups this under Greedy (because the standard\nIndian/US coin systems allow a greedy solution), but for arbitrary\ndenominations a DP solution is required for correctness.\n\nExamples:\nInput: coins = [1, 2, 5], amount = 11\nOutput: 3\nExplanation: 11 = 5 + 5 + 1. We need 3 coins to make up the amount 11.\n\nInput : coins = [2, 5], amount = 3\nOutput: -1\nExplanation: It's not possible to make amount 3 with coins 2 and 5. Since we can't\ncombine coins 2 and 5 to make the amount 3, the output is -1.", n: "#Brute Force:\n1. This is Coin Change (LeetCode 322), a DP problem, NOT greedy — greedy fails\n   for arbitrary denominations (e.g. coins=[1,3,4], amount=6: greedy takes\n   4+1+1=3, but the optimal is 3+3=2). So we explore all combinations.\n2. Define find_coins(i, amount) = fewest coins to form `amount` using only\n   coins[0..i]. Since supply is infinite, \"taking\" a coin does not consume the\n   index — we can take coins[i] again.\n3. Base case (i == 0, only the first coin available): if coins[0] divides\n   amount exactly, we need amount // coins[0] coins; otherwise this amount is\n   impossible with just coin 0, so return 10**9 (a sentinel for \"infinity\"). Using\n   a LARGE value (not -1) is critical, because the recurrence takes a min — a\n   negative sentinel would be wrongly chosen as the minimum.\n4. For i > 0 there are two choices:\n   - skip: don't use coins[i] at all -> find_coins(i-1, amount), add 0.\n   - take: only if coins[i] <= amount, use one coins[i] and stay on index i\n     (infinite supply) -> 1 + find_coins(i, amount - coins[i]).\n5. Return min(take, skip). Impossible branches stay at 10**9 so min discards them.\n6. The wrapper minimum_coins_brute calls find_coins(len-1, amount) and converts\n   the 10**9 sentinel back to -1 (the required \"cannot be made\" output).\nTC -> O(2^(N + amount)) — exponential branching, states recomputed repeatedly.\nSC -> O(N + amount) recursion stack depth.\n\n#Better Approach:\n1. Same recurrence as the brute, but the (i, amount) state is revisited by many\n   paths, causing the exponential blowup. Memoize it so each state is solved\n   once.\n2. Build a dp table of shape len(coins) x (amount + 1), all cells seeded to -1\n   meaning \"not yet computed\" (safe sentinel: a real answer is >= 0, and\n   impossible is stored as 10**9, so -1 never collides with a real value).\n3. In find_coins_dp keep the same base case (i == 0), but for i > 0 first check\n   dp[i][amount]: if it is not -1 the state is already solved, return it.\n4. Otherwise compute skip and take exactly as in the brute — but recurse into\n   find_coins_dp (passing dp along) so children are memoized too — then STORE\n   the result in dp[i][amount] before returning.\n5. The wrapper minimum_coins_better allocates dp, calls find_coins_dp, and\n   converts the 10**9 sentinel to -1. Each of the N*(amount+1) states is filled\n   once with O(1) work, so the exponential tree collapses to O(N*amount).\nTC -> O(N * amount) — one computation per (i, amount) state.\nSC -> O(N * amount) for the dp table, plus O(N + amount) recursion stack.\n\n#Optimal Approach:\nTwo variants, both bottom-up tabulation (no recursion, no stack).\n\nVariant I — 2D tabulation (minimum_coins_optimal_variant_i):\n1. Same states and recurrence as the memoized \"better\" tier, filled iteratively\n   from the base up instead of on demand. dp[i][T] = fewest coins to make T\n   using coins[0..i].\n2. Seed the base row (i == 0): for every T from 0..amount, dp[0][T] =\n   T // coins[0] if coins[0] divides T, else 10**9.\n3. Loop i from 1..len(coins)-1 (outer) and T from 0..amount (inner) — the\n   opposite direction to how the recursion unwinds, so every cell a formula\n   reads is already filled.\n4. Copy the recurrence with table lookups: skip = dp[i-1][T]; take =\n   1 + dp[i][T-coins[i]] when coins[i] <= T (stays on row i for infinite\n   supply); dp[i][T] = min(skip, take).\n5. Answer = dp[len-1][amount], with the 10**9 sentinel converted to -1.\nTC -> O(N * amount). SC -> O(N * amount) for the full table.\n\nVariant II — space-optimized tabulation (minimum_coins_optimal_variant_ii):\n1. dp[i][...] only ever reads row i-1 (skip) and row i (take), so two 1D rows\n   of length amount+1 suffice: prev (row i-1) and curr (row i).\n2. Seed the base case into prev, then in the loop use prev[...] wherever the 2D\n   version read dp[i-1][...] and curr[...] wherever it read dp[i][...].\n3. Roll prev = curr after each coin. Read the answer from prev[amount] — when\n   len(coins)==1 the loop never runs and the base row still lives in prev; when\n   it runs, prev also ends on the last computed row.\nTC -> O(N * amount). SC -> O(amount) — the real optimal.\n\n#KEY INSIGHT:\n- Coin Change is DP, not greedy: greedy fails for arbitrary denominations\n  (coins=[1,3,4], amount=6 -> greedy 4+1+1=3, optimal 3+3=2). The recurrence\n  \"for each coin, min(skip it, take it and stay)\" plus a +infinity sentinel for\n  impossible states solves it exactly; because each dp row only depends on the\n  previous row, the 2D table collapses to two 1D rows for O(amount) space.", s: true },
      { name: "Assign Cookies", d: "easy"                                                                                                                  , q: "Assign Cookies\nA teacher wants to distribute cookies to students such that each\nstudent receives at most one cookie. Given two arrays `student` and\n`cookie`:\n  - student[i] is the greed factor of the i-th student (the minimum\n    cookie size they require to be content).\n  - cookie[j] is the size of the j-th cookie.\nA cookie j can be assigned to a student i if and only if cookie[j] >=\nstudent[i]. Each student gets at most one cookie; each cookie can be\nassigned to at most one student. Maximize the number of content\nstudents and return that count.\n\nExamples:\nInput : Student = [1, 2, 3] , Cookie = [1, 1]\nOutput :1\nExplanation: Only the first cookie (1) satisfies the first student (1), therefore only\n1 student is content.\n\nInput : Student = [1, 2] , Cookie = [1, 2, 3]\nOutput : 2\nExplanation: Cookie 1 satisfies student 1 and cookie 2 satisfies student 2. Therefore,\n2 students are content.", n: "#Brute Force:\n1. Sort both `student` and `cookie` ascending first. The recursion only ever\n   tries the *current* least-greedy student against the *current* smallest\n   cookie, so without sorting that fixed matching order would miss valid\n   pairings (e.g. student=[3,1], cookie=[1,3] would find 1 match instead of 2).\n2. Define solve(i, j) = max students that can be contented using student[i:]\n   and cookie[j:]. `i` is the student pointer, `j` the cookie pointer.\n3. Base case: if i runs past the last student or j past the last cookie, no one\n   more can be contented -> return 0.\n4. If the current cookie satisfies the current student (cookie[j] >=\n   student[i]), there are two real choices and we take whichever yields more:\n   - assign: hand cookie j to student i -> 1 + solve(i+1, j+1). The +1 is the\n     student we just contented; both pointers advance.\n   - skip: hold cookie j back for a greedier student -> solve(i, j+1). Only the\n     cookie pointer advances; student i keeps waiting.\n5. If the current cookie is too small even for the current (least greedy\n   remaining) student, it is useless to everyone left, so drop it and move to\n   the next cookie -> solve(i, j+1). No max here: there is nothing to weigh.\n6. Return solve(0, 0). The best count bubbles up through the max at each fork.\n   Because different paths revisit the same (i, j) state, work is recomputed\n   exponentially — memoizing solve(i, j) is exactly the \"better\" O(n*m) tier.\nTC -> O(2^(N + M)) — each satisfiable state forks into assign/skip with no\nreuse of subproblems (plus O(N log N + M log M) to sort).\nSC -> O(N + M) recursion stack depth (ignoring the in-place sort).\n\n#Better Approach:\n1. Same recursion as the brute force, but observe that solve(i, j) is called\n   with the same (i, j) many times across different paths — that repeated work\n   is what makes the brute exponential. Cache each result so it is computed once.\n2. Sort both arrays (same reason as brute), then build a dp table of shape\n   len(student) x len(cookie), every cell seeded to -1 meaning \"not computed\".\n   -1 is a safe sentinel because a real answer is always >= 0.\n3. In solve_cookies_dp(i, j), keep the same base case (i or j past the end -> 0),\n   then before doing any work check dp[i][j]: if it is not -1 the state is\n   already solved, so return the cached value immediately.\n4. Otherwise compute exactly as in the brute — assign (1 + solve(i+1, j+1)) vs\n   skip (solve(i, j+1)) when the cookie fits, else just skip the cookie — but\n   STORE the result in dp[i][j] before returning it, so any later path reuses it.\n5. Return solve_cookies_dp(0, 0). Each of the N*M states is now filled once with\n   O(1) work, collapsing the exponential tree to O(N*M). (This is the same set\n   of states the TUF+ tabulation fills bottom-up instead of on demand.)\nTC -> O(N * M) — one computation per (i, j) state (plus O(N log N + M log M) to\nsort).\nSC -> O(N * M) for the dp table, plus O(N + M) recursion stack depth.\n\n#Optimal Approach:\n1. Intuition: to content as many students as possible, never \"waste\" a large\n   cookie on a low-greed student when a smaller cookie would have satisfied\n   them. So we want to hand the smallest cookie that works to the least greedy\n   remaining student. Sorting both arrays lets us walk them in that order.\n2. Sort `student` (greed factors) and `cookie` (sizes) ascending. Now index 0\n   of each is the least greedy student and the smallest cookie.\n3. Keep two pointers: `left` over students (also doubles as the content count,\n   since a student is only advanced once satisfied) and `right` over cookies.\n4. At each step compare the current smallest unserved cookie `cookie[right]`\n   with the current least greedy unserved student `student[left]`:\n   - If `cookie[right] >= student[left]`, this cookie satisfies the student —\n     assign it, advance `left` (one more content student) and `right`.\n   - If it is too small for even the least greedy student, it is useless to\n     everyone remaining (they are all greedier), so discard it by advancing\n     only `right`.\n5. Stop when either list is exhausted; `left` is the number of students served.\n   Example: student=[1,2,3,4,5], cookie sorted=[1,3,4] → matches 1→1, 2→3,\n   3→4, then cookies run out, answer 3.\nTC -> O(N log N + M log M) for the two sorts; the two-pointer sweep is O(N + M).\nSC -> O(1) auxiliary (ignoring the in-place sort's stack).\n\n#KEY INSIGHT:\n- Sort both, then greedily give the smallest cookie that works to the least\n  greedy remaining student. A cookie too small for the least greedy student is\n  too small for everyone left, so it can be dropped with no regret — this lets\n  a single forward sweep of both sorted arrays find the maximum matching.", s: true }
    ]

  {
    name: "Recursion", problems: [
      { name: "Subset Sums", d: "hard"                                                                                                                  , q: "Subset Sums\nGiven an array, print the sum of every subset generated from it, in increasing order.\n\nExamples:\nInput: N = 3, arr[] = {5,2,1}\nOutput: 0,1,2,3,5,6,7,8\nExplanation: The generated subsets are [], [5], [2], [5,2], [1], [5,1], [2,1], [5,2,1],\nso the subset sums are 0, 5, 2, 7, 1, 6, 3, 8 which sorted give 0,1,2,3,5,6,7,8.\n\nInput: N=3,arr[]= {3,1,2}\nOutput: 0,1,2,3,3,4,5,6\nExplanation: The generated subsets are [], [3], [1], [3,1], [2], [3,2], [1,2], [3,1,2],\nso the subset sums are 0, 3, 1, 4, 2, 5, 3, 6 which sorted give 0,1,2,3,3,4,5,6.", n: "#Brute Force:\n1. Every subset is a series of independent include/exclude choices, one per\n   element, so with n elements there are exactly 2^n possible subsets. Encode\n   each subset as an integer `mask` from 0 to 2^n - 1, where bit i being set\n   means \"include nums[i]\".\n2. Compute the number of masks as `1 << n` (i.e. 2^n) and iterate over every\n   value in that range — each value is one distinct subset.\n3. For a given mask, walk all n bit positions; whenever bit i is set\n   (`mask & (1 << i)`), add nums[i] into that subset's running sum.\n4. Append each subset's sum to the answer list.\n5. Sort the answer ascending, since the problem asks for sums in increasing order.\n   (Cost note: the inner n-bit scan is re-done for all 2^n masks — that redundant\n   re-summation is what the optimal approach removes.)\nTC -> O(2^n * n) to build + O(2^n log(2^n)) to sort, SC -> O(2^n) for the output\n\n#Better Approach:\nSKIPPED — no distinct intermediate exists. Both viable solutions still enumerate\nall 2^n subsets; the only real gain is dropping the per-subset re-summation, which\nis exactly the optimal recursion below. There is no sensible tier between them.\n\n#Optimal Approach:\n1. Rather than rebuilding each subset's total from scratch, thread a running\n   `sum` down the recursion so every subset total is maintained incrementally\n   in O(1) per step.\n2. At each `index`, branch into two recursive calls — one that PICKS nums[index]\n   (recurse with sum + nums[index]) and one that SKIPS it (recurse with sum\n   unchanged). These two choices, taken over all indices, enumerate all 2^n\n   include/exclude combinations.\n3. Base case: when `index == len(nums)` every element has been decided, so the\n   accumulated `sum` is one complete subset's sum — append it to the answer.\n4. Each of the 2^n leaves does O(1) work (no inner loop over n like the bitmask),\n   so generation is O(2^n) — a full factor of n faster than the brute force.\n5. Sort the answer ascending for the required increasing-order output.\nTC -> O(2^n) to build + O(2^n log(2^n)) to sort, SC -> O(2^n) output + O(n) stack\n\n#KEY INSIGHT:\n- Carry the running sum down the recursion instead of a subset list: each of the\n  2^n subset sums is then produced in O(1), so you only pay to enumerate the\n  subsets, never to re-add their elements.", s: true },
      { name: "Subsets II", d: "medium"                                                                                                                  , q: "Subsets II\nGiven an integer array nums which may contain duplicate entries, return the power set\n(all subsets). The solution set must not contain duplicate subsets. Return the subsets\nin any order.\n\nExamples:\nInput: array[] = [1,2,2]\nOutput: [ [ ],[1],[1,2],[1,2,2],[2],[2,2] ]\nExplanation: We can have subsets ranging from length 0 to 3, which are listed above.\nAlso the subset [1,2] appears twice but is printed only once as we require unique subsets.\n\nInput: array[] = [1]\nOutput: [ [ ], [1] ]\nExplanation: Only two unique subsets are available.", n: "#Brute Force:\n1. Generate the entire power set exactly like plain Subsets: recurse index by\n   index, making a \"not-pick\" call and then a \"pick\" call, so all 2^n\n   include/exclude combinations flow down to the base case.\n2. Sort nums first. Duplicates only cause repeated subsets when equal *values*\n   sit at different positions — e.g. in [2,1,2] the picks {0,1} and {1,2} both\n   have multiset {1,2} but, unsorted, would build tuples (2,1) vs (1,2). Sorting\n   forces index-order to equal value-order, so any two subsets with the same\n   multiset build the identical tuple.\n3. At the base case (index == len(nums)) convert the current subset list to a\n   tuple and add it to a set. Tuples are hashable, so the set silently discards\n   duplicate subsets (the two different ways of forming [1,2] collapse to one).\n4. After recursion finishes, convert each stored tuple back to a list for the\n   final answer.\nTC -> O(2^n * n): 2^n leaves, each O(n) to build+hash a tuple.\nSC -> O(2^n * n) for the set of subsets, plus O(n) recursion depth.\n\n#Better Approach:\nSKIPPED — no distinct middle tier. The problem goes straight from \"enumerate all\n2^n subsets and dedupe with a set\" (brute) to \"sort + skip duplicates so no set\nis needed\" (optimal); there is no sensible intermediate.\n\n#Optimal Approach:\n1. Sort nums so equal values sit adjacently — this is what lets us detect and\n   skip duplicates by a simple neighbour comparison.\n2. Model generation differently from the brute: instead of a per-element\n   pick/not-pick, every recursive call *is itself* a valid subset. So the first\n   line appends a copy of the current `subset` to the answer — [] is captured on\n   the very first call.\n3. From position `index`, loop i over the remaining elements and treat each as\n   \"the next element to append\", recursing with start = i+1 so every element is\n   used at most once down a branch.\n4. Duplicate-skip: within one loop level, if i > index (i.e. not the first,\n   mandatory choice at this level) and nums[i] == nums[i-1], skip it. The first\n   occurrence of a value already spawned the branch that produces every subset\n   starting with that value here, so a second identical value would only rebuild\n   duplicates — e.g. for [1,2,2] at index after 1, picking the first 2 covers\n   [2] and [2,2]; the second 2 is skipped as a starting choice.\n5. Append nums[i], recurse, then pop to backtrack and try the next candidate.\nTC -> O(2^n * n): up to 2^n subsets, each O(n) to copy into the answer.\nSC -> O(n) recursion depth (output not counted); no dedup set required.\n\n#KEY INSIGHT:\n- Sorting + the \"skip nums[i] when i > index and nums[i] == nums[i-1]\" rule\n  generates every unique subset exactly once, so no hash set is needed. Passing\n  i+1 (not index+1) as the next start is what keeps each element used at most\n  once per branch — the exact bug that, when wrong, produced impossible subsets.", s: true },
      { name: "Combination Sum", d: "medium"                                                                                                                  , q: "Combination Sum\nGiven an array of distinct integers `candidates` and a target integer\n`target`, return a list of all unique combinations of `candidates`\nwhere the chosen numbers sum to `target`. You may return the\ncombinations in any order.\nThe SAME number may be chosen from `candidates` an UNLIMITED number of\ntimes. Two combinations are unique if the frequency of at least one of\nthe chosen numbers is different.\nThe test cases are generated such that the number of unique\ncombinations that sum up to `target` is less than 150 combinations.\n\nExamples:\nExample 1:\nInput: candidates = [2, 3, 6, 7], target = 7\nOutput: [[2, 2, 3], [7]]\nExplanation: 2 + 2 + 3 = 7. 7 is itself a candidate.\n\nExample 2:\nInput: candidates = [2, 3, 5], target = 8\nOutput: [[2, 2, 2, 2], [2, 3, 3], [3, 5]]\n\nExample 3:\nInput: candidates = [2], target = 1\nOutput: []\n\nConstraints:\n1 <= candidates.length <= 30\n2 <= candidates[i] <= 40\nAll elements of candidates are distinct.\n1 <= target <= 40\n\nExamples:\nExample 1:\nInput: array = [2,3,6,7], target = 7\nOutput: [[2,2,3],[7]]\nExplanation: 2 and 3 are candidates, and 2 + 2 + 3 = 7. Note that 2 can be used multiple times.\n 7 is a candidate, and 7 = 7.\n These are the only two combinations.\n\nExample 2:\nInput: array = [2], target = 1\nOutput: []\nExplaination: No combination is possible.", n: "#Brute Force:\n1.\nTC -> O(), SC -> O()\n\n#Better Approach:\n1.\nTC -> O(), SC -> O()\n\n#Optimal Approach:\n1.\nTC -> O(), SC -> O()\n\n#KEY INSIGHT:\n-" },
      { name: "Combination Sum II", d: "medium"                                                                                                                  , q: "Combination Sum II\nGiven a collection of candidate numbers (candidates) and an integer target, find all unique\ncombinations in candidates where the sum is equal to the target. There can only be one usage\nof each number in a candidates combination, and return the answer in sorted order.\ne.g.: The combinations [1, 1, 2] and [1, 2, 1] are not unique.\n\nExamples:\nExample 1:\nInput: candidates = [2, 1, 2, 7, 6, 1, 5], target = 8\nOutput: [[1, 1, 6], [1, 2, 5], [1, 7], [2, 6]]\nExplanation: The combinations that sum up to target are\n1 + 1 + 6 => 8; 1 + 2 + 5 => 8; 1 + 7 => 8; 2 + 6 => 8.\n\nExample 2:\nInput: candidates = [2, 5, 2, 1, 2], target = 5\nOutput: [[1, 2, 2], [5]]\nExplanation: The combinations that sum up to target are 1 + 2 + 2 => 5; 5 => 5.\n\nConstraints:\n1 <= candidates.length <= 100\n1 <= candidates[i] <= 50\n1 <= target <= 30", n: "#Brute Force:\n1.\nTC -> O(), SC -> O()\n\n#Better Approach:\n1.\nTC -> O(), SC -> O()\n\n#Optimal Approach:\n1.\nTC -> O(), SC -> O()\n\n#KEY INSIGHT:\n-" },
      { name: "Palindrome partitioning", d: "hard"                                                                                                                  , q: "Palindrome partitioning\nGiven a string s, partition string s such that every substring of the partition is a\npalindrome. Return all possible palindrome partitions of string s.\n\nExamples:\nExample 1:\nInput: s = \"aabaa\"\nOutput: [[\"a\", \"a\", \"b\", \"a\", \"a\"], [\"a\", \"a\", \"b\", \"aa\"], [\"a\", \"aba\", \"a\"],\n         [\"aa\", \"b\", \"a\", \"a\"], [\"aa\", \"b\", \"aa\"], [\"aabaa\"]]\nExplanation: Above are all the possible ways in which the string can be partitioned so that\neach substring is a palindrome.\n\nExample 2:\nInput: s = \"baa\"\nOutput: [[\"b\", \"a\", \"a\"], [\"b\", \"aa\"]]\nExplanation: Above are all the possible ways in which the string can be partitioned so that\neach substring is a palindrome.\n\nConstraints:\n1 <= s.length <= 16\ns contains only lowercase English letters.", n: "#Brute Force:\n1.\nTC -> O(), SC -> O()\n\n#Better Approach:\n1.\nTC -> O(), SC -> O()\n\n#Optimal Approach:\n1.\nTC -> O(), SC -> O()\n\n#KEY INSIGHT:\n-" },
      { name: "Permutation Sequence", d: "medium"                                                                                                                  , q: "Permutation Sequence\nGiven N and K, where N is the sequence of numbers from 1 to N (i.e.,\n[1, 2, 3, ..., N]), find the K-th permutation sequence (1-indexed) in\nthe lexicographically sorted list of all N! permutations of [1..N].\nReturn the permutation as a string.\n\nExamples:\nExample 1:\nInput: N = 3, K = 3\nOutput: \"213\"\nExplanation: The 3! = 6 permutations of [1, 2, 3] in order are:\n\"123\", \"132\", \"213\", \"231\", \"312\", \"321\". The 3rd is \"213\".\n\nExample 2:\nInput: N = 4, K = 9\nOutput: \"2314\"\n\nConstraints:\n1 <= N <= 9\n1 <= K <= N!", n: "#Brute Force:\n1.\nTC -> O(), SC -> O()\n\n#Better Approach:\n1.\nTC -> O(), SC -> O()\n\n#Optimal Approach:\n1.\nTC -> O(), SC -> O()\n\n#KEY INSIGHT:\n-" }
