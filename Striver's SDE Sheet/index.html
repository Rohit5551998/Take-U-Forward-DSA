  {
    name: "Binary Search", problems: [
      { name: "The N-th root of an integer", d: "medium"                     , q: "The N-th root of an integer\nGiven two numbers N and M, find the Nth root of M. The N-th root of a\nnumber M is defined as a number X when raised to the power N equals M\n(i.e., X^N = M). If the N-th root is not an integer, return -1.\n\nExamples:\nInput: N = 3, M = 27\nOutput: 3\nExplanation: The cube root of 27 is equal to 3.\n\nInput : N = 4, M = 69\nOutput: -1\nExplanation : The 4th root of 69 does not exist. So, the answer is -1.", n: "#Brute Force:\n1.\nTC -> O(), SC -> O()\n\n#Better Approach:\n1.\nTC -> O(), SC -> O()\n\n#Optimal Approach:\n1.\nTC -> O(), SC -> O()\n\n#KEY INSIGHT:\n-" },
      { name: "Matrix Median", d: "hard"                     , q: "Matrix Median\nGiven a row-wise sorted matrix of size M*N, where M is no. of rows and N is no. of columns, find the median in the given matrix. Note: M*N is odd.", n: "#Brute Force:\n1.\nTC -> O(), SC -> O()\n\n#Better Approach:\n1.\nTC -> O(), SC -> O()\n\n#Optimal Approach:\n1.\nTC -> O(), SC -> O()\n\n#KEY INSIGHT:\n-" },
      { name: "Single element in sorted array", d: "medium"                     , q: "Single element in sorted array\nGiven an array of N integers. Every number in the array except one appears twice. Find the single number in the array.", n: "#Brute Force:\n1.\nTC -> O(), SC -> O()\n\n#Better Approach:\n1.\nTC -> O(), SC -> O()\n\n#Optimal Approach:\n1.\nTC -> O(), SC -> O()\n\n#KEY INSIGHT:\n-" },
      { name: "Search element in a sorted and rotated array/ find pivot where it is rotated", d: "medium"                     , q: "Search element in a sorted and rotated array/ find pivot where it is rotated\nGiven an integer array nums, sorted in ascending order with distinct\nvalues, and a target value k. The array is rotated at some pivot point\nthat is unknown (e.g., [0,1,2,3,4,5] may become [3,4,5,0,1,2]). Find\nthe index at which k is present in the array. If k is not present,\nreturn -1.\nYou must solve the problem in O(log n) time.\n\nExamples:\nInput:nums = [4, 5, 6, 7, 0, 1, 2], k = 0\nOutput :4\nExplanation : Here, the target is 0. We can see that 0 is present in the given rotated sorted array, nums. Thus, we get output as 4, which is the index at which 0 is present in the array.\n\nInput: nums = [4, 5, 6, 7, 0, 1, 2], k = 3\nOutput :-1\nExplanation :Here, the target is 3. Since 3 is not present in the given rotated sorted array. Thus, we get the output as -1.", n: "#Brute Force:\n1.\nTC -> O(), SC -> O()\n\n#Better Approach:\n1.\nTC -> O(), SC -> O()\n\n#Optimal Approach:\n1.\nTC -> O(), SC -> O()\n\n#KEY INSIGHT:\n-" },
      { name: "Median of 2 sorted arrays", d: "hard"                     , q: "Median of 2 sorted arrays\nGiven two sorted arrays arr1 and arr2 of size m and n respectively,\nreturn the median of the two sorted arrays. The median is defined as\nthe middle value of a sorted list of numbers. If the total length of\nthe combined sorted list (m + n) is even, the median is the average of\nthe two middle values.\n\nExamples:\nExample 1:\nInput: arr1 = [1, 3], arr2 = [2]\nOutput: 2.0\nExplanation: Merged sorted array = [1, 2, 3]. Median is 2.\n\nExample 2:\nInput: arr1 = [1, 2], arr2 = [3, 4]\nOutput: 2.5\nExplanation: Merged sorted array = [1, 2, 3, 4]. Median = (2 + 3) / 2 = 2.5.\n\nConstraints:\n0 <= m, n <= 1000, 1 <= m + n <= 2000\n-10^6 <= arr1[i], arr2[i] <= 10^6\n\nFollow up: The naive merge is O(m+n). Can you achieve O(log(min(m, n)))?", n: "#Brute Force:\n1.\nTC -> O(), SC -> O()\n\n#Better Approach:\n1.\nTC -> O(), SC -> O()\n\n#Optimal Approach:\n1.\nTC -> O(), SC -> O()\n\n#KEY INSIGHT:\n-" },
      { name: "Kth element of 2 sorted arrays", d: "medium"                     , q: "Kth element of 2 sorted arrays\nGiven two sorted arrays `a` and `b` of size m and n respectively, find\nthe k-th element (1-indexed) of the final sorted array obtained by\nmerging them.\n\nExamples:\nExample 1:\nInput: a = [2, 3, 6, 7, 9], b = [1, 4, 8, 10], k = 5\nOutput: 6\nExplanation: The final sorted array would be [1, 2, 3, 4, 6, 7, 8, 9, 10]. The 5th element of this array is 6.\n\nExample 2:\nInput: a = [100, 112, 256, 349, 770], b = [72, 86, 113, 119, 265, 445, 892], k = 7\nOutput: 256\nExplanation: The final sorted array is [72, 86, 100, 112, 113, 119, 256, 265, 349, 445, 770, 892]. The 7th element of this array is 256.", n: "#Brute Force:\n1.\nTC -> O(), SC -> O()\n\n#Better Approach:\n1.\nTC -> O(), SC -> O()\n\n#Optimal Approach:\n1.\nTC -> O(), SC -> O()\n\n#KEY INSIGHT:\n-" },
      { name: "Allocate Minimum Number of Pages", d: "hard"                     , q: "Allocate Minimum Number of Pages\nGiven an array 'arr' of integer numbers, arr[i] represents the number of\npages in the i-th book. There are 'm' number of students. The task is to\nallocate books to students such that:\n  1. Each student gets at least one book.\n  2. Each book is allocated to only one student.\n  3. Book allocation is contiguous (a student gets a consecutive set of\n     books).\nAllocate books in such a way that the maximum number of pages assigned\nto a student is minimum. Return that minimum value. If allocation is not\npossible (e.g., books < students), return -1.\n\nExamples:\nExample 1:\nInput Format: n = 4, m = 2, arr[] = {12, 34, 67, 90}\nResult: 113\nExplanation: The allocation of books will be 12, 34, 67 | 90. One student will get the first 3 books and the other will get the last one.\n\nExample 2:\nInput Format: n = 5, m = 4, arr[] = {25, 46, 28, 49, 24}\nResult: 71\nExplanation: The allocation of books will be 25, 46 | 28 | 49 | 24.", n: "#Brute Force:\n1.\nTC -> O(), SC -> O()\n\n#Better Approach:\n1.\nTC -> O(), SC -> O()\n\n#Optimal Approach:\n1.\nTC -> O(), SC -> O()\n\n#KEY INSIGHT:\n-" },
      { name: "Aggressive Cows", d: "hard"                     , q: "Aggressive Cows\nYou are given an array 'arr' of size 'n' which denotes the position of\nstalls. You are also given an integer 'k' which denotes the number of\naggressive cows. You are given the task of assigning stalls to 'k' cows\nsuch that the minimum distance between any two of them is the maximum\npossible. Find the maximum possible minimum distance.\n\nExamples:\nExample 1:\nInput Format: N = 6, k = 4, arr[] = {0,3,4,7,10,9}\nResult: 3\nExplanation: The maximum possible minimum distance between any two cows will be 3 when 4 cows are placed at positions {0, 3, 7, 10}. Here the distances between cows are 3, 4, and 3 respectively. We cannot make the minimum distance greater than 3 in any ways.\n\nExample 2:\nInput Format: N = 5, k = 2, arr[] = {4,2,1,3,6}\nResult: 5\nExplanation: The maximum possible minimum distance between any two cows will be 5 when 2 cows are placed at positions {1, 6}.", n: "#Brute Force:\n1.\nTC -> O(), SC -> O()\n\n#Better Approach:\n1.\nTC -> O(), SC -> O()\n\n#Optimal Approach:\n1.\nTC -> O(), SC -> O()\n\n#KEY INSIGHT:\n-" }
    ]
  },
  {
    name: "Heaps", problems: [
      { name: "Implement Max Heap", d: "medium"                     , q: "Implement Max Heap\nImplement a Max Heap from scratch with the following methods:\n  - insert(x)    — Insert value x into the max heap.\n  - getMax()     — Return the maximum value currently in the heap\n                   (without removing it).\n  - extractMax() — Remove and return the maximum value from the heap.\n  - heapSize()   — Return the current size of the heap.\n  - isEmpty()    — Return true if the heap is empty, false otherwise.\n\nImplementation hints:\n  - Use a 1-indexed array (or 0-indexed; just stay consistent).\n  - For node at index i: parent at i/2, left child at 2i, right child at 2i+1.\n  - insert: append at the end, then \"sift-up\" (swap with parent while\n    parent value < own value).\n  - extractMax: swap top with last, pop the last, then \"sift-down\"\n    (swap with larger child while a child > self).\n  - All operations are O(log n) except getMax/heapSize/isEmpty (O(1)).", n: "#Brute Force:\n1.\nTC -> O(), SC -> O()\n\n#Better Approach:\n1.\nTC -> O(), SC -> O()\n\n#Optimal Approach:\n1.\nTC -> O(), SC -> O()\n\n#KEY INSIGHT:\n-" },
      { name: "K-th Largest element in an array", d: "medium"                     , q: "K-th Largest element in an array\nGiven an integer array `nums` and an integer k, return the k-th\nLARGEST element in the array. Note that it is the k-th largest element\nin sorted order, not the k-th distinct element.\nCan you solve it without sorting?\n\nExamples:\nExample 1:\nInput: nums = [3, 2, 1, 5, 6, 4], k = 2\nOutput: 5\n\nExample 2:\nInput: nums = [3, 2, 3, 1, 2, 4, 5, 5, 6], k = 4\nOutput: 4\n\nConstraints:\n1 <= k <= nums.length <= 10^5\n-10^4 <= nums[i] <= 10^4\n\nApproaches:\n  - O(n log n): sort and return nums[n-k].\n  - O(n log k): maintain a min-heap of size k; the heap root is the\n    answer when done.\n  - O(n) average: Quickselect (partition-based selection).", n: "#Brute Force:\n1.\nTC -> O(), SC -> O()\n\n#Better Approach:\n1.\nTC -> O(), SC -> O()\n\n#Optimal Approach:\n1.\nTC -> O(), SC -> O()\n\n#KEY INSIGHT:\n-" },
      { name: "Maximum Sum Combination", d: "hard"                     , q: "Maximum Sum Combination\nGiven two integer arrays nums1 and nums2 (of equal length n) and an\ninteger k, return the maximum k valid sum combinations from all\npossible sum combinations, where each sum is formed by picking one\nelement from nums1 and one element from nums2 (one of each per pair).\nA sum combination is the sum nums1[i] + nums2[j] for any valid pair of\nindices (i, j). Return the top k such sums in non-increasing order.\n\nOptimal approach: use a max-heap (priority queue). Sort both arrays in\ndescending order, then push the top combination (nums1[0]+nums2[0])\nand explore neighbors greedily, using a visited set to avoid\nduplicates.\n\nExamples:\nInput : nums1 = [7, 3], nums2 = [1, 6], k = 2\n Output : [13, 9]\n Explanation : The 2 maximum combinations are made by: nums1[0] + nums2[1] = 13 nums1[1] + nums2[1] = 9\n\n Input : nums1 = [3, 4, 5], nums2 = [2, 6, 3], k = 2\nOutput : [11, 10]\nExplanation : The 2 maximum combinations are made by: nums1[2] + nums2[1] = 11 nums1[1] + nums2[1] = 10", n: "#Brute Force:\n1.\nTC -> O(), SC -> O()\n\n#Better Approach:\n1.\nTC -> O(), SC -> O()\n\n#Optimal Approach:\n1.\nTC -> O(), SC -> O()\n\n#KEY INSIGHT:\n-" },
      { name: "Find Median from Data Stream", d: "hard"                     , q: "Find Median from Data Stream\nImplement the MedianFinder class:\n  MedianFinder()         — Initializes the object.\n  void addNum(int num)   — Adds the integer num from the data stream.\n  double findMedian()    — Returns the median of all elements seen so\n                           far. If the size of the list is even, the\n                           median is the average of the two middle\n                           values (use float division).\n\nFollow up:\n  1. If all integer numbers from the stream are in the range [0, 100],\n     can you optimize your solution?\n  2. If 99% of all integer numbers from the stream are in the range\n     [0, 100], can you optimize your solution?\n\nOptimal approach: maintain two heaps — a max-heap for the lower half\nand a min-heap for the upper half — kept balanced (size difference ≤ 1).\n- addNum is O(log n)\n- findMedian is O(1)\n\nExamples:\nInput : [MedianFinder(), addNum(1), addNum(2), addNum(3), findMedian()]\nOutput : [null, null, null, null, 2]\nExplanation : MedianFinder() initializes the object. addNum(1) adds 1 to the data stream → [1] addNum(2) adds 2 → [1, 2] addNum(3) adds 3 → [1, 2, 3] findMedian() returns 2 as the median of [1, 2, 3]\n\nInput : [MedianFinder(), addNum(1), addNum(6), findMedian(), addNum(3), findMedian()]\nOutput : [null, null, null, 3.5, null, 3]\nExplanation : MedianFinder() initializes the object. addNum(1) → [1] addNum(6) → [1, 6] findMedian() returns (1+6)/2 = 3.5 addNum(3) → [1, 3, 6] findMedian() returns 3 as the median", n: "#Brute Force:\n1.\nTC -> O(), SC -> O()\n\n#Better Approach:\n1.\nTC -> O(), SC -> O()\n\n#Optimal Approach:\n1.\nTC -> O(), SC -> O()\n\n#KEY INSIGHT:\n-" },
      { name: "Merge K Sorted Arrays", d: "medium"                     , q: "Merge K Sorted Arrays\nYou are given k sorted arrays, each of size k. Merge all the arrays\ninto one sorted array and return it.\nYou should use an efficient algorithm. The expected time complexity is\nO(k^2 log k) — equivalently O(N log k) where N is the total number of\nelements across all arrays.\n\nExamples:\nExample 1:\nInput: k = 3, arrays = [[1, 2, 3], [4, 5, 6], [7, 8, 9]]\nOutput: [1, 2, 3, 4, 5, 6, 7, 8, 9]\n\nExample 2:\nInput: k = 2, arrays = [[1, 4, 7], [2, 5, 8]]\nOutput: [1, 2, 4, 5, 7, 8]\n\nConstraints:\n1 <= k <= 100\nEach array has size k.\n-10^9 <= array[i][j] <= 10^9\n\nOptimal approach: use a min-heap of size k. Push the first element of\neach array into the heap (with array index + position). Pop the min,\nappend to result, push the next element from the same array. Repeat\nuntil the heap is empty.", n: "#Brute Force:\n1.\nTC -> O(), SC -> O()\n\n#Better Approach:\n1.\nTC -> O(), SC -> O()\n\n#Optimal Approach:\n1.\nTC -> O(), SC -> O()\n\n#KEY INSIGHT:\n-" },
      { name: "Top K Frequent Elements", d: "medium"                     , q: "Top K Frequent Elements\nGiven an integer array `nums` and an integer k, return the k most\nfrequent elements. You may return the answer in any order.\n\nExamples:\nExample 1:\nInput: nums = [1, 1, 1, 2, 2, 3], k = 2\nOutput: [1, 2]\n\nExample 2:\nInput: nums = [1], k = 1\nOutput: [1]\n\nConstraints:\n1 <= nums.length <= 10^5\n-10^4 <= nums[i] <= 10^4\nk is in the range [1, the number of unique elements in the array].\nIt is guaranteed that the answer is unique.\n\nFollow up: Your algorithm's time complexity must be better than\nO(n log n), where n is the array's size.\n\nApproaches:\n  - O(n + u log u): count frequencies with a hashmap, then sort\n    entries by count.\n  - O(n + u log k): count frequencies, then keep a min-heap of size k\n    keyed by frequency.\n  - O(n): count frequencies, then use bucket sort indexed by\n    frequency (buckets of size up to n).", n: "#Brute Force:\n1.\nTC -> O(), SC -> O()\n\n#Better Approach:\n1.\nTC -> O(), SC -> O()\n\n#Optimal Approach:\n1.\nTC -> O(), SC -> O()\n\n#KEY INSIGHT:\n-" }
    ]
  },
  {
    name: "Stack and Queue", problems: [
      { name: "Implement Stack using Arrays", d: "easy"                     , q: "Implement Stack using Arrays\nImplement a Last-In-First-Out (LIFO) stack using an array. The implemented stack should support the following operations: push, pop, peek, and isEmpty. Implement the ArrayStack c.\n\nExamples:\nExample 1:\nInput:\n[\"ArrayStack\", \"push\", \"push\", \"top\", \"pop\", \"isEmpty\"]\n[[], [5], [10], [], [], []]\nOutput: [null, null, null, 10, 10, false]\nExplanation: ArrayStack stack = new ArrayStack();\n- stack.push(5);\n- stack.push(10);\n- stack.top(); // returns 10\n- stack.pop(); // returns 10\n- stack.isEmpty(); // returns false\n\nExample 2:\nInput:\n[\"ArrayStack\", \"isEmpty\", \"push\", \"pop\", \"isEmpty\"]\n[[], [], [1], [], []]\nOutput: [null, true, null, 1, true]\nExplanation: ArrayStack stack = new ArrayStack();\n- stack.push(1);\n- stack.pop(); // returns 1\n- stack.isEmpty(); // returns true", n: "#Brute Force:\n1.\nTC -> O(), SC -> O()\n\n#Better Approach:\n1.\nTC -> O(), SC -> O()\n\n#Optimal Approach:\n1.\nTC -> O(), SC -> O()\n\n#KEY INSIGHT:\n-" },
      { name: "Implement Queue using Arrays", d: "easy"                     , q: "Implement Queue using Arrays\nImplement a First-In-First-Out (FIFO) queue using an array. The implemented queue should support the following operations: push, dequeue, pop, and isEmpty. Implement the ArrayQue.\n\nExamples:\nExample 1:\nInput:\n[\"ArrayQueue\", \"push\", \"push\", \"peek\", \"pop\", \"isEmpty\"]\n[[], [5], [10], [], [], []]\nOutput: [null, null, null, 5, 5, false]\nExplanation:\nArrayQueue queue = new ArrayQueue();\n- queue.push(5);\n- queue.push(10);\n- queue.peek(); // returns 5\n- queue.pop(); // returns 5\n- queue.isEmpty(); // returns false\n\nExample 2:\nInput:\n[\"ArrayQueue\", \"isEmpty\"]\n[[]]\nOutput: [null, true]\n\nExplanation:\nArrayQueue queue = new ArrayQueue();\n- queue.isEmpty(); // returns true", n: "#Brute Force:\n1.\nTC -> O(), SC -> O()\n\n#Better Approach:\n1.\nTC -> O(), SC -> O()\n\n#Optimal Approach:\n1.\nTC -> O(), SC -> O()\n\n#KEY INSIGHT:\n-" },
      { name: "Implement Stack using Queue (using single queue)", d: "easy"                     , q: "Implement Stack using Queue (using single queue)\nImplement a Last-In-First-Out (LIFO) stack using a single queue. The implemented stack should support the following operations: push, pop, top, and isEmpty. Implement the QueueSt.\n\nExamples:\nExample 1:\nInput:\n[\"QueueStack\", \"push\", \"push\", \"pop\", \"top\", \"isEmpty\"]\n[[], [4], [8], [], [], []]\nOutput: [null, null, null, 8, 4, false]\nExplanation: QueueStack stack = new QueueStack();\n- stack.push(4);\n- stack.push(8);\n- stack.pop(); // returns 8\n- stack.top(); // returns 4\n- stack.isEmpty(); // returns false\n\nExample 2:\nInput:\n[\"QueueStack\", \"isEmpty\"]\n[[]]\nOutput: [null, true]\nExplanation: QueueStack stack = new QueueStack();\n- stack.isEmpty(); // returns true", n: "#Brute Force:\n1.\nTC -> O(), SC -> O()\n\n#Better Approach:\n1.\nTC -> O(), SC -> O()\n\n#Optimal Approach:\n1.\nTC -> O(), SC -> O()\n\n#KEY INSIGHT:\n-" },
      { name: "Implement Queue using Stack", d: "easy"                     , q: "Implement Queue using Stack\nImplement a First-In-First-Out (FIFO) queue using two stacks. The implemented queue should support the following operations: push, pop, peek, and isEmpty. Implement the StackQueu.\n\nExamples:\nExample 1:\nInput:\n[\"StackQueue\", \"push\", \"push\", \"pop\", \"peek\", \"isEmpty\"]\n[[], [4], [8], [], [], []]\nOutput: [null, null, null, 4, 8, false]\nExplanation:\nStackQueue queue = new StackQueue();\n- queue.push(4);\n- queue.push(8);\n- queue.pop(); // returns 4\n- queue.peek(); // returns 8\n- queue.isEmpty(); // returns false\n\nExample 2:\nInput:\n[\"StackQueue\", \"isEmpty\"]\n[[]]\nOutput: [null, true]\nExplanation:\nStackQueue queue = new StackQueue();\n- queue.isEmpty(); // returns true", n: "#Brute Force:\n1.\nTC -> O(), SC -> O()\n\n#Better Approach:\n1.\nTC -> O(), SC -> O()\n\n#Optimal Approach:\n1.\nTC -> O(), SC -> O()\n\n#KEY INSIGHT:\n-" },
      { name: "Balanced Paranthesis", d: "easy"                     , q: "Balanced Paranthesis\nGiven a string str containing just the characters '(', ')', '{', '}',\n'[' and ']', determine if the input string is valid. The input string\nis valid if:\n  1. Open brackets must be closed by the same type of brackets.\n  2. Open brackets must be closed in the correct order.\n  3. Every close bracket has a corresponding open bracket of the same type.\nReturn true if the string is balanced, false otherwise.\n\nExamples:\nExample 1:\nInput: str = \"()\"\nOutput: true\n\nExample 2:\nInput: str = \"()[]{}\"\nOutput: true\n\nExample 3:\nInput: str = \"(]\"\nOutput: false\n\nExample 4:\nInput: str = \"([)]\"\nOutput: false\n\nExample 5:\nInput: str = \"{[]}\"\nOutput: true\n\nConstraints:\n1 <= str.length <= 10^4\nstr consists of parentheses only '()[]{}'", n: "#Brute Force:\n1.\nTC -> O(), SC -> O()\n\n#Better Approach:\n1.\nTC -> O(), SC -> O()\n\n#Optimal Approach:\n1.\nTC -> O(), SC -> O()\n\n#KEY INSIGHT:\n-" },
      { name: "Next Greater Element", d: "medium"                     , q: "Next Greater Element\nGiven an integer array A, return the next greater element for every element in A. The next greater element for an element x is the first element greater than x that we come acros.", n: "#Brute Force:\n1.\nTC -> O(), SC -> O()\n\n#Better Approach:\n1.\nTC -> O(), SC -> O()\n\n#Optimal Approach:\n1.\nTC -> O(), SC -> O()\n\n#KEY INSIGHT:\n-" },
      { name: "Sort a Stack", d: "medium"                     , q: "Sort a Stack\nYou are given a stack of integers. Your task is to sort the stack in descending order using recursion, such that the top of the stack contains the greatest element. You are not a.\n\nExamples:\nExample 1:\nInput: stack = [4, 1, 3, 2]\nOutput: [4, 3, 2, 1]\nExplanation: After sorting, the largest element (4) is at the top, and the smallest (1) is at the bottom.\n\nExample 2:\nInput: stack = [1]\nOutput: [1]\nExplanation: A single-element stack is already sorted.", n: "#Brute Force:\n1.\nTC -> O(), SC -> O()\n\n#Better Approach:\n1.\nTC -> O(), SC -> O()\n\n#Optimal Approach:\n1.\nTC -> O(), SC -> O()\n\n#KEY INSIGHT:\n-" }
    ]
  },
  {
    name: "Stack and Queue Part-II", problems: [
      { name: "Next Smaller Element", d: "medium"                     , q: "Next Smaller Element\nGiven an array of integers arr, your task is to find the Next Smaller Element (NSE) for every element in the array. The Next Smaller Element for an element x is defined as the fi.\n\nExamples:\nExample 1:\nInput: arr = [4, 8, 5, 2, 25]\nOutput: [2, 5, 2, -1, -1]\nExplanation:\n- For 4, the next smaller element is 2.\n- For 8, the next smaller element is 5.\n- For 5, the next smaller element is 2.\n- For 2, there is no smaller element to its right → -1.\n- For 25, no smaller element exists → -1.\n\nExample 2:\nInput: arr = [10, 9, 8, 7]\nOutput: [9, 8, 7, -1]\nExplanation:\nEach element’s next right neighbor is smaller.\nEach element’s next right neighbor is smaller.", n: "#Brute Force:\n1.\nTC -> O(), SC -> O()\n\n#Better Approach:\n1.\nTC -> O(), SC -> O()\n\n#Optimal Approach:\n1.\nTC -> O(), SC -> O()\n\n#KEY INSIGHT:\n-" },
      { name: "LRU Cache", d: "medium"                     , q: "LRU Cache\nDesign a data structure that follows the constraints of a Least Recently Used (LRU) cache. Implement the LRUCache class: LRUCache(int capacity) : Initialize the LRU cache with po.", n: "#Brute Force:\n1.\nTC -> O(), SC -> O()\n\n#Better Approach:\n1.\nTC -> O(), SC -> O()\n\n#Optimal Approach:\n1.\nTC -> O(), SC -> O()\n\n#KEY INSIGHT:\n-" },
      { name: "LFU Cache", d: "hard"                     , q: "LFU Cache\nDesign and implement a data structure for a Least Frequently Used (LFU) cache. Implement the LFUCache class with the following functions: LFUCache(int capacity): Initialize the o.\n\nExamples:\nExample 1:\nInput: [\"LFUCache\", \"put\", \"put\", \"get\", \"put\", \"get\", \"get\", \"put\", \"get\", \"get\", \"get\"]\nOutput: [null, null, null, 1, null, -1, 3, null, -1, 3, 4]\nExplanation:\nLFUCache lfu = new LFUCache(2); Initializing cache with capacity of 2.\nlfu.put(1, 1); Cache becomes: [1, _], cnt(1)=1.\nlfu.put(2, 2); Cache becomes: [2, 1], cnt(2)=1, cnt(1)=1.\nlfu.get(1); Returns 1. Cache becomes: [1, 2], cnt(2)=1, cnt(1)=2.\nlfu.put(3, 3); Cache evicts 2 as it has the lowest frequency. Cache becomes: [3, 1], cnt(3)=1, cnt(1)=2.\nlfu.get(2); Returns -1 (not found).\nlfu.get(3); Returns 3. Cache becomes: [3, 1], cnt(3)=2, cnt(1)=2.\nlfu.put(4, 4); Cache evicts 1 (LRU). Cache becomes: [4, 3], cnt(4)=1, cnt(3)=2.\nlfu.get(1); Returns -1 (not found).\nlfu.get(3); Returns 3. Cache becomes: [3, 4], cnt(4)=1, cnt(3)=3.\nlfu.get(4); Returns 4. Cache becomes: [4, 3], cnt(4)=2, cnt(3)=3.\n\nExample 2:\nInput: [\"LFUCache\", \"put\", \"put\", \"put\", \"put\", \"put\", \"get\", \"get\", \"get\", \"get\", \"get\"]\nOutput: [null, null, null, null, null, null, 3, 4, 5, -1, -1]\nExplanation:\nLFUCache lfu = new LFUCache(3); Initializing cache with capacity of 3.\nlfu.put(5, 7); Cache becomes: [5], cnt(5)=1.\nlfu.put(4, 6); Cache becomes: [4, 5], cnt(4)=1, cnt(5)=1.\nlfu.put(3, 5); Cache becomes: [3, 4, 5], cnt(3)=1, cnt(4)=1, cnt(5)=1.\nlfu.put(2, 4); Cache evicts 5 as it has the lowest frequency. Cache becomes: [2, 3, 4], cnt(2)=1, cnt(3)=1, cnt(4)=1.\nlfu.put(1, 3); Cache evicts 4 as it has the lowest frequency. Cache becomes: [1, 2, 3], cnt(1)=1, cnt(2)=1, cnt(3)=1.\nlfu.get(1); Returns 3. Cache becomes: [1, 2, 3], cnt(1)=2, cnt(2)=1, cnt(3)=1.\nlfu.get(2); Returns 4. Cache becomes: [2, 1, 3], cnt(1)=2, cnt(2)=2, cnt(3)=1.\nlfu.get(3); Returns 5. Cache becomes: [3, 2, 1], cnt(1)=2, cnt(2)=2, cnt(3)=2.\nlfu.get(4); Returns -1 (not found).\nlfu.get(5); Returns -1 (not found).", n: "#Brute Force:\n1.\nTC -> O(), SC -> O()\n\n#Better Approach:\n1.\nTC -> O(), SC -> O()\n\n#Optimal Approach:\n1.\nTC -> O(), SC -> O()\n\n#KEY INSIGHT:\n-" },
      { name: "Largest rectangle in a histogram", d: "hard"                     , q: "Largest rectangle in a histogram\nGiven an array of integers heights representing the histogram's bar height where the width of each bar is 1 return the area of the largest rectangle in histogram. .\n\nExamples:\nExample:\n\nInput: N =6, heights[] = {2,1,5,6,2,3}\nOutput: 10", n: "#Brute Force:\n1.\nTC -> O(), SC -> O()\n\n#Better Approach:\n1.\nTC -> O(), SC -> O()\n\n#Optimal Approach:\n1.\nTC -> O(), SC -> O()\n\n#KEY INSIGHT:\n-" },
      { name: "Sliding Window Maximum", d: "hard"                     , q: "Sliding Window Maximum\nGiven an array of integers arr, there is a sliding window of size k which is moving from the very left of the array to the very right. You can only see the k numbers in the windo.\n\nExamples:\nInput: arr = [4,0,-1,3,5,3,6,8], k = 3\nOutput: [4,3,5,5,6,8]\nExplanation:\n\nWindow position Max\n------------------------ -----\n[4 0 -1] 3 5 3 6 8 4\n 4 [0 -1 3] 5 3 6 8 3\n 4 0 [-1 3 5] 3 6 8 5\n 4 0 -1 [3 5 3] 6 8 5\n 4 0 -1 3 [5 3 6] 8 6\n 4 0 -1 3 5 [3 6 8] 8\n\nFor each window of size k=3, we find the maximum element in the window and add it to our output array.\n\nInput: arr= [20,25], k = 2\nOutput: [25]\nExplanation: There’s just one window is size 2 that is possible and the maximum of the two elements is our answer.", n: "#Brute Force:\n1.\nTC -> O(), SC -> O()\n\n#Better Approach:\n1.\nTC -> O(), SC -> O()\n\n#Optimal Approach:\n1.\nTC -> O(), SC -> O()\n\n#KEY INSIGHT:\n-" },
      { name: "Implement Min Stack", d: "hard"                     , q: "Implement Min Stack\nDesign a stack that supports the following operations in constant time: push, pop, top, and retrieving the minimum element. Implement the MinStack class: MinStack(): Initializes.", n: "#Brute Force:\n1.\nTC -> O(), SC -> O()\n\n#Better Approach:\n1.\nTC -> O(), SC -> O()\n\n#Optimal Approach:\n1.\nTC -> O(), SC -> O()\n\n#KEY INSIGHT:\n-" },
      { name: "Rotten Oranges", d: "medium"                     , q: "Rotten Oranges\nGiven an n x m grid, where each cell has the following values : 2 - represents a rotten orange , 1 - represents a Fresh orange , 0 - represents an Empty Cell . Every minute, if a.\n\nExamples:\nInput :grid = [ [2, 1, 1] , [0, 1, 1] , [1, 0, 1] ]\nOutput :-1\nExplanation : Orange at (3,0) cannot be rotten.\n\nInput :grid = [ [2,1,1] , [1,1,0] , [0,1,1] ]\nOutput :4\nExplanation :", n: "#Brute Force:\n1.\nTC -> O(), SC -> O()\n\n#Better Approach:\n1.\nTC -> O(), SC -> O()\n\n#Optimal Approach:\n1.\nTC -> O(), SC -> O()\n\n#KEY INSIGHT:\n-" },
      { name: "Stock span problem", d: "hard"                     , q: "Stock span problem\nGiven an array arr of size n, where each element arr[i] represents the\nstock price on day i, calculate the SPAN of stock prices for each day.\nThe span S_i for a specific day i is defined as the maximum number of\nconsecutive days (ending at day i, going back) for which the price on\nthose days was LESS THAN OR EQUAL TO the price on day i.\n\nExamples:\nExample 1:\nInput: arr = [100, 80, 60, 70, 60, 75, 85]\nOutput: [1, 1, 1, 2, 1, 4, 6]\nExplanation:\n  Day 0 (100): only itself -> 1\n  Day 1 (80): 100 is greater -> 1\n  Day 2 (60): -> 1\n  Day 3 (70): includes 60 -> 2\n  Day 4 (60): -> 1\n  Day 5 (75): 60, 70, 60 are ≤ 75 -> 4\n  Day 6 (85): all prior are ≤ 85 -> 6\n\nExample 2:\nInput: arr = [10, 4, 5, 90, 120, 80]\nOutput: [1, 1, 2, 4, 5, 1]\n\nConstraints:\n1 <= n <= 10^5\n1 <= arr[i] <= 10^5\n\nOptimal approach: monotonic decreasing stack of (price, span) pairs.", n: "#Brute Force:\n1.\nTC -> O(), SC -> O()\n\n#Better Approach:\n1.\nTC -> O(), SC -> O()\n\n#Optimal Approach:\n1.\nTC -> O(), SC -> O()\n\n#KEY INSIGHT:\n-" },
      { name: "Maximum of Minimums for Every Window Size", d: "medium"                     , q: "Maximum of Minimums for Every Window Size\nGiven an array arr[] of size n, for every window size i from 1 to n,\nfind the maximum of the minimum of all contiguous subarrays of size i.\nReturn an array `ans` of size n where ans[i-1] contains the maximum\nof minimums for window size i.\n\nExamples:\nExample 1:\nInput: arr = [10, 20, 30, 50, 10, 70, 30]\nOutput: [70, 30, 20, 10, 10, 10, 10]\nExplanation:\n  Window size 1: max of (10,20,30,50,10,70,30) = 70\n  Window size 2: mins are (10,20,30,10,10,30) => max = 30\n  Window size 3: mins are (10,20,10,10,10) => max = 20\n  ... and so on.\n\nExample 2:\nInput: arr = [10, 20, 30]\nOutput: [30, 20, 10]\n\nConstraints:\n1 <= n <= 10^5\n1 <= arr[i] <= 10^9\n\nOptimal approach: O(n) using a monotonic stack — for each element find\nthe nearest smaller to the left and right; that element is the min in\na window of size (right - left - 1), and contributes to all smaller\nwindow sizes too. Then propagate to fill all window sizes.", n: "#Brute Force:\n1.\nTC -> O(), SC -> O()\n\n#Better Approach:\n1.\nTC -> O(), SC -> O()\n\n#Optimal Approach:\n1.\nTC -> O(), SC -> O()\n\n#KEY INSIGHT:\n-" },
      { name: "Celebrity Problem", d: "hard"                     , q: "Celebrity Problem\nA celebrity is a person who is known by everyone else at the party but does not know anyone in return. Given a square matrix M of size N x N where M[i][j] is 1 if person i knows.", n: "#Brute Force:\n1.\nTC -> O(), SC -> O()\n\n#Better Approach:\n1.\nTC -> O(), SC -> O()\n\n#Optimal Approach:\n1.\nTC -> O(), SC -> O()\n\n#KEY INSIGHT:\n-" }
    ]
